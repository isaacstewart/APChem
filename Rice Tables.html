<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RICE - Equilibrium Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:           #0b0c0f;
  --bg-2:         #11131a;
  --panel:        #171a22;
  --panel-2:      #1d212c;
  --panel-3:      #262b39;
  --border:       #2a2f3c;
  --border-2:     #3a3f4f;
  --text:         #ede8d8;
  --text-dim:     #9ba0ac;
  --text-faint:   #5b606e;
  --accent:       #f5b842;
  --accent-bright:#fbcb6b;
  --accent-deep:  #c98a1a;
  --accent-glow:  rgba(245, 184, 66, 0.38);
  --teal:         #2dd4bf;
  --teal-soft:    #5eead4;
  --teal-glow:    rgba(45, 212, 191, 0.32);
  --red:          #e85d4f;
  --red-glow:     rgba(232, 93, 79, 0.35);
  --gold:         #fbcb6b;
  --gold-glow:    rgba(251, 203, 107, 0.40);
  --orange:       #ed7d3a;
  --orange-glow:  rgba(237, 125, 58, 0.40);
  --purple:       #b8825e;    /* repurposed: warm copper for level color */
  --purple-glow:  rgba(184, 130, 94, 0.35);
  --amber:        #f5b842;
  --flame:        #e85d4f;
  --mono:    'JetBrains Mono', ui-monospace, 'Courier New', monospace;
  --display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  --ui:      'Inter', system-ui, -apple-system, sans-serif;
  --radius-lg: 16px;
  --radius:    10px;
  --radius-sm: 6px;
  --t-fast:   140ms cubic-bezier(0.4, 0, 0.2, 1);
  --t-base:   220ms cubic-bezier(0.4, 0, 0.2, 1);
  --t-bouncy: 320ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--ui);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  position: relative;
  font-feature-settings: "ss01", "cv11";
}

/* ============ AMBIENT GRAPHICS LAYER ============ */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: -1;
  overflow: hidden;
  background:
    radial-gradient(ellipse 60% 40% at 85% -5%, rgba(245, 184, 66, 0.10), transparent 60%),
    radial-gradient(ellipse 50% 35% at 10% 100%, rgba(45, 212, 191, 0.06), transparent 60%),
    linear-gradient(180deg, #0b0c0f 0%, #0d1014 100%);
}
.ambient::before, .ambient::after {
  content: ""; position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: drift 28s ease-in-out infinite;
}
.ambient::before {
  top: -200px; left: -100px;
  background: radial-gradient(circle, var(--accent-glow), transparent 60%);
}
.ambient::after {
  bottom: -250px; right: -150px;
  background: radial-gradient(circle, rgba(184, 130, 94, 0.25), transparent 60%);
  animation-delay: -14s;
}
@keyframes drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33%      { transform: translate(60px, -40px) scale(1.1); }
  66%      { transform: translate(-30px, 50px) scale(0.95); }
}
.ambient .grid-overlay {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 90%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 90%);
}

/* ============ TYPOGRAPHY HELPERS ============ */
.display { font-family: var(--display); letter-spacing: -0.01em; }
.mono    { font-family: var(--mono); }
.eyebrow {
  font-family: var(--mono); font-size: 0.66rem;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-faint);
}

/* ============ SCROLLBARS ============ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 999px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--accent-deep); }

/* ============ TOP BAR ============ */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.85rem 1.6rem;
  background: rgba(11, 12, 15, 0.72);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 1rem;
}
.topbar-left { display: flex; align-items: center; gap: 1rem; }
.topbar-right { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; }

.icon-btn {
  width: 38px; height: 38px;
  display: grid; place-items: center;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--t-fast);
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--panel-2); color: var(--accent); border-color: var(--accent); transform: translateY(-1px); }
.icon-btn.active { background: var(--panel-3); color: var(--accent); border-color: var(--accent); }
.icon-btn svg { width: 18px; height: 18px; stroke: currentColor; }

.brand { display: flex; align-items: center; gap: 0.85rem; cursor: pointer; user-select: none; }
.brand-mark {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, rgba(245,184,66,0.18), rgba(45,212,191,0.08));
  border: 1px solid var(--border-2);
  border-radius: 11px;
  position: relative;
  overflow: hidden;
  transition: all var(--t-base);
}
.brand-mark::after {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 30%, var(--accent-glow), transparent 60%);
  opacity: 0.6;
}
.brand-mark svg { width: 24px; height: 24px; position: relative; z-index: 1; color: var(--accent); }
.brand:hover .brand-mark { border-color: var(--accent); transform: rotate(-4deg) scale(1.04); }

.brand-text { display: flex; flex-direction: column; gap: 1px; }
.brand-name {
  font-family: var(--display);
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1;
}
.brand-name .accent-dot { color: var(--accent); }
.brand-sub {
  font-family: var(--mono); font-size: 0.64rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-faint);
}

/* ============ HUD ============ */
.hud { display: flex; gap: 0.5rem; align-items: center; }
.hud-chip {
  display: flex; align-items: center; gap: 0.55rem;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.4rem 0.8rem;
  font-family: var(--mono);
  transition: all var(--t-fast);
  position: relative;
}
.hud-chip:hover { transform: translateY(-1px); border-color: var(--border-2); }
.hud-chip svg { width: 14px; height: 14px; flex-shrink: 0; }
.hud-chip .hud-stack { display: flex; flex-direction: column; gap: 1px; line-height: 1; }
.hud-chip .hud-label {
  font-size: 0.58rem; letter-spacing: 0.16em;
  color: var(--text-faint); text-transform: uppercase;
}
.hud-chip .hud-val { font-size: 0.92rem; font-weight: 700; color: var(--text); }
.hud-chip.streak { border-color: rgba(237, 125, 58, 0.30); }
.hud-chip.streak svg, .hud-chip.streak .hud-val { color: var(--orange); }
.hud-chip.stars  { border-color: rgba(251, 203, 107, 0.30); }
.hud-chip.stars  svg, .hud-chip.stars  .hud-val { color: var(--gold); }
.hud-chip.level  { border-color: rgba(184, 130, 94, 0.30); }
.hud-chip.level  svg, .hud-chip.level  .hud-val { color: var(--purple); }

.level-bar {
  width: 60px; height: 4px;
  background: var(--bg);
  border-radius: 999px;
  overflow: hidden;
  margin-left: 0.4rem;
  position: relative;
}
.level-bar-fill {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--purple), var(--accent));
  border-radius: 999px;
  transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============ LAYOUT ============ */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  min-height: calc(100vh - 71px);
  transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.layout.sidebar-collapsed { grid-template-columns: 0 1fr; }

/* ============ SIDEBAR ============ */
.sidebar {
  background: rgba(17, 19, 26, 0.55);
  border-right: 1px solid var(--border);
  padding: 1.4rem 1rem 2rem;
  overflow-y: auto; overflow-x: hidden;
  transition: all 0.3s ease;
  backdrop-filter: blur(8px);
}
.layout.sidebar-collapsed .sidebar {
  padding-left: 0; padding-right: 0;
  opacity: 0; pointer-events: none;
  border-right: none;
}
.side-section { margin-bottom: 1.6rem; }
.side-title {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: var(--text-faint);
  margin-bottom: 0.7rem;
  padding-left: 0.2rem;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 0.4rem;
}
.side-title::before { content: ""; width: 8px; height: 1px; background: var(--accent); }

.side-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
.side-stat {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.7rem;
  font-family: var(--mono);
  transition: all var(--t-fast);
  position: relative; overflow: hidden;
}
.side-stat:hover { border-color: var(--border-2); transform: translateY(-1px); }
.side-stat .label {
  font-size: 0.54rem;
  color: var(--text-faint);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 4px;
}
.side-stat .label svg { width: 10px; height: 10px; }
.side-stat .val {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
  margin-top: 4px;
  font-family: var(--display);
}
.side-stat.streak .val, .side-stat.streak .label svg { color: var(--orange); }
.side-stat.stars  .val, .side-stat.stars  .label svg { color: var(--gold); }
.side-stat.level  .val, .side-stat.level  .label svg { color: var(--purple); }
.side-stat.solved .val, .side-stat.solved .label svg { color: var(--teal); }

.side-mode-current {
  background: linear-gradient(135deg, rgba(245, 184, 66, 0.06), var(--panel));
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  padding: 0.7rem 0.85rem;
  margin-bottom: 0.5rem;
  position: relative; overflow: hidden;
}
.side-mode-current::before {
  content: ""; position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--accent), var(--accent-deep));
}
.side-mode-current .label {
  font-family: var(--mono); font-size: 0.56rem;
  color: var(--text-faint); letter-spacing: 0.2em;
  text-transform: uppercase;
}
.side-mode-current .name {
  font-family: var(--display);
  font-size: 0.95rem;
  color: var(--text);
  font-weight: 600;
  margin-top: 3px;
}

.side-btn {
  display: flex; align-items: center; gap: 0.55rem;
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.74rem;
  padding: 0.7rem 0.9rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--t-fast);
  margin-bottom: 0.4rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.side-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.side-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateX(3px); }
.side-btn .kbd {
  margin-left: auto;
  font-size: 0.62rem;
  color: var(--text-faint);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--bg);
}

.side-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  color: #111;
  border-color: var(--accent);
  font-weight: 700;
  box-shadow: 0 4px 14px var(--accent-glow);
}
.side-btn.primary:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
  box-shadow: 0 6px 22px var(--accent-glow);
}
.side-btn.primary .kbd {
  color: rgba(0,0,0,0.7);
  border-color: rgba(0,0,0,0.2);
  background: rgba(255,255,255,0.18);
}

.recent-list { display: flex; flex-direction: column; gap: 0.35rem; }
.recent-item {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.5rem 0.7rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.4rem;
  transition: all var(--t-fast);
}
.recent-item:hover { border-color: var(--border-2); }
.recent-item .rname { color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recent-item .rstars { color: var(--gold); font-size: 0.7rem; flex-shrink: 0; letter-spacing: 1px; }
.recent-empty {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text-faint);
  text-align: center;
  padding: 0.8rem 0.5rem;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  letter-spacing: 0.04em;
}

/* ============ WORKSPACE ============ */
.workspace {
  padding: 2rem 2rem 5rem;
  max-width: 1180px;
  margin: 0 auto;
  width: 100%;
}

/* ============ HOME SCREEN ============ */
.home {
  margin: 0.5rem auto;
  max-width: 980px;
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.home-hero {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2.5rem;
  align-items: center;
  padding: 1.5rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}
.home-hero-text {}
.home-eyebrow {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: var(--mono); font-size: 0.66rem;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--accent);
  padding: 0.35rem 0.7rem;
  background: rgba(245, 184, 66, 0.08);
  border: 1px solid rgba(245, 184, 66, 0.25);
  border-radius: 999px;
  margin-bottom: 1rem;
}
.home-eyebrow::before {
  content: ""; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.5; transform: scale(0.75); }
}

.home-title {
  font-family: var(--display);
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 0.6rem;
  color: var(--text);
}
.home-title .grad {
  background: linear-gradient(90deg, var(--accent-bright) 0%, var(--accent) 50%, var(--accent-deep) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.home-tag {
  font-family: var(--ui);
  font-size: 1.02rem;
  color: var(--text-dim);
  line-height: 1.65;
  max-width: 520px;
  margin-top: 0.4rem;
}
.home-tag strong { color: var(--text); font-weight: 600; }

/* Hero visual: orbiting molecule */
.home-hero-art {
  width: 220px; height: 220px;
  position: relative;
  display: grid; place-items: center;
}
.home-hero-art svg { width: 100%; height: 100%; overflow: visible; }
.orbit-ring { fill: none; stroke: var(--border-2); stroke-width: 1; stroke-dasharray: 3 6; opacity: 0.5; }
.orbit-ring.r1 { animation: spin 20s linear infinite; }
.orbit-ring.r2 { animation: spin 32s linear infinite reverse; }
.orbit-atom { fill: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
.orbit-atom.teal { fill: var(--teal); filter: drop-shadow(0 0 8px var(--teal-glow)); }
.orbit-atom.copper { fill: var(--purple); filter: drop-shadow(0 0 8px var(--purple-glow)); }
.orbit-spin1 { transform-origin: 110px 110px; animation: spin 12s linear infinite; }
.orbit-spin2 { transform-origin: 110px 110px; animation: spin 18s linear infinite reverse; }
.orbit-spin3 { transform-origin: 110px 110px; animation: spin 24s linear infinite; }
.orbit-nucleus { fill: var(--accent); filter: drop-shadow(0 0 14px var(--accent-glow)); animation: nucPulse 3s ease-in-out infinite; }
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
@keyframes nucPulse {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.08); }
}

.home-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.7rem;
  margin: 0 0 2.2rem;
}
.home-stat {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1rem 0.85rem;
  position: relative; overflow: hidden;
  transition: all var(--t-base);
}
.home-stat::after {
  content: ""; position: absolute; top: 0; right: 0; bottom: 0; width: 2px;
  background: var(--stat-color, var(--accent));
  opacity: 0;
  transition: opacity var(--t-fast);
}
.home-stat:hover { transform: translateY(-2px); border-color: var(--border-2); }
.home-stat:hover::after { opacity: 1; }
.home-stat .stat-head {
  display: flex; align-items: center; gap: 0.4rem;
  font-family: var(--mono);
  font-size: 0.6rem; letter-spacing: 0.18em;
  color: var(--text-faint); text-transform: uppercase;
  margin-bottom: 0.55rem;
}
.home-stat .stat-head svg { width: 12px; height: 12px; }
.home-stat .v {
  font-family: var(--display);
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  letter-spacing: -0.01em;
}
.home-stat.streak { --stat-color: var(--orange); }
.home-stat.streak .stat-head, .home-stat.streak .stat-head svg { color: var(--orange); }
.home-stat.stars  { --stat-color: var(--gold); }
.home-stat.stars  .stat-head, .home-stat.stars  .stat-head svg { color: var(--gold); }
.home-stat.solved { --stat-color: var(--teal); }
.home-stat.solved .stat-head, .home-stat.solved .stat-head svg { color: var(--teal); }
.home-stat.level  { --stat-color: var(--purple); }
.home-stat.level  .stat-head, .home-stat.level  .stat-head svg { color: var(--purple); }

.home-section {
  margin-bottom: 2rem;
}
.home-section-title {
  font-family: var(--display);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.9rem;
  display: flex; align-items: baseline; gap: 0.8rem;
}
.home-section-title .num {
  font-family: var(--mono); font-size: 0.7rem;
  color: var(--accent); letter-spacing: 0.18em;
  padding: 2px 8px; border: 1px solid var(--accent);
  border-radius: 4px; background: rgba(245, 184, 66, 0.08);
}
.home-section-title .rule {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.7rem;
}
.mode-chip {
  position: relative;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.15rem;
  cursor: pointer;
  transition: all var(--t-base);
  text-align: left;
  font-family: var(--ui);
  display: flex; flex-direction: column; gap: 0.45rem;
  overflow: hidden;
  isolation: isolate;
}
.mode-chip::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, var(--accent-glow), transparent 70%);
  opacity: 0; transition: opacity var(--t-base);
  z-index: -1;
}
.mode-chip:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 14px 32px rgba(0,0,0,0.35);
}
.mode-chip:hover::before { opacity: 0.20; }
.mode-chip.selected {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(245,184,66,0.07), var(--panel));
}
.mode-chip.selected::before { opacity: 0.30; }
.mode-chip.selected .mode-check { display: grid; }

.mode-icon {
  width: 36px; height: 36px;
  display: grid; place-items: center;
  border: 1px solid var(--border-2);
  border-radius: 9px;
  color: var(--accent);
  background: var(--bg-2);
  transition: all var(--t-base);
}
.mode-icon svg { width: 19px; height: 19px; }
.mode-chip:hover .mode-icon { border-color: var(--accent); transform: rotate(-3deg); }

.mode-name {
  font-family: var(--display);
  font-size: 0.98rem;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--text);
}
.mode-desc {
  font-family: var(--ui);
  font-size: 0.83rem;
  color: var(--text-dim);
  line-height: 1.5;
}
.mode-check {
  display: none;
  position: absolute;
  top: 0.8rem; right: 0.8rem;
  width: 22px; height: 22px;
  background: var(--accent);
  color: #111;
  border-radius: 50%;
  place-items: center;
  font-size: 0.7rem; font-weight: 800;
  box-shadow: 0 0 12px var(--accent-glow);
}
.mode-check svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 3; }
.mode-chip.recommended .mode-tag {
  position: absolute; top: 0.7rem; right: 0.7rem;
  font-family: var(--mono);
  font-size: 0.55rem; letter-spacing: 0.18em;
  color: var(--accent);
  background: rgba(245, 184, 66, 0.10);
  border: 1px solid rgba(245, 184, 66, 0.40);
  border-radius: 4px;
  padding: 3px 7px;
  text-transform: uppercase;
}
.mode-chip.recommended.selected .mode-tag { display: none; }

.start-row {
  display: flex;
  gap: 0.8rem;
  margin: 0 0 1.5rem;
  flex-wrap: wrap;
}
.btn-mega {
  flex: 1; min-width: 220px;
  font-family: var(--display);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 1.05rem 1.7rem;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, var(--accent-bright), var(--accent));
  color: #1a1208;
  cursor: pointer;
  box-shadow: 0 8px 24px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.25);
  transition: all var(--t-base);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.65rem;
  position: relative;
  overflow: hidden;
}
.btn-mega::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.25) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}
.btn-mega:hover { transform: translateY(-2px); box-shadow: 0 12px 32px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.3); }
.btn-mega:hover::before { transform: translateX(100%); }
.btn-mega:active { transform: translateY(0); }
.btn-mega svg { width: 16px; height: 16px; }

.howto {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0;
  overflow: hidden;
  transition: all var(--t-base);
}
.howto[open] { border-color: var(--border-2); }
.howto summary {
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.74rem;
  letter-spacing: 0.16em;
  color: var(--text-dim);
  list-style: none;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.95rem 1.2rem;
  text-transform: uppercase;
}
.howto summary::-webkit-details-marker { display: none; }
.howto summary .caret {
  width: 10px; height: 10px;
  border: solid var(--accent);
  border-width: 0 2px 2px 0;
  transform: rotate(-45deg);
  transition: transform var(--t-base);
}
.howto[open] summary .caret { transform: rotate(45deg); }
.howto-body {
  padding: 0 1.2rem 1.2rem;
  font-family: var(--ui);
  font-size: 0.88rem;
  color: var(--text-dim);
  line-height: 1.7;
  border-top: 1px solid var(--border);
  padding-top: 1rem;
}
.howto-body ol { padding-left: 1.4rem; }
.howto-body li { margin-bottom: 0.5rem; }
.howto-body strong { color: var(--text); font-weight: 600; }
.howto-body em { color: var(--accent); font-style: normal; font-weight: 500; }
.howto-body kbd {
  font-family: var(--mono); font-size: 0.78rem;
  background: var(--bg);
  border: 1px solid var(--border-2);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 7px;
  color: var(--text);
}

/* ============ PROBLEM HEADER ============ */
.problem-header {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem 1.7rem;
  margin-bottom: 1.2rem;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease;
}
.problem-header::before {
  content: ""; position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.5;
}
.ph-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 0.8rem;
  flex-wrap: wrap;
}
.ph-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.55rem; }
.cat-tag {
  display: inline-flex; align-items: center; gap: 0.35rem;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  color: var(--accent);
  background: rgba(245, 184, 66, 0.08);
  border: 1px solid rgba(245, 184, 66, 0.30);
  border-radius: 4px;
  padding: 3px 9px;
  text-transform: uppercase;
}
.cat-tag.tier-1 { color: var(--teal); background: rgba(45, 212, 191, 0.07); border-color: rgba(45, 212, 191, 0.30); }
.cat-tag.tier-2 { color: var(--accent); background: rgba(245, 184, 66, 0.08); border-color: rgba(245, 184, 66, 0.30); }
.cat-tag.tier-3 { color: var(--flame); background: rgba(232, 93, 79, 0.08); border-color: rgba(232, 93, 79, 0.35); }
.problem-title {
  font-family: var(--display);
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0.5rem 0 0.85rem;
  line-height: 1.15;
}
.reaction-display {
  font-size: 1.32rem;
  padding: 0.7rem 0;
  color: var(--text);
}
.given-info {
  font-family: var(--mono);
  font-size: 0.88rem;
  color: var(--text-dim);
  margin-top: 0.7rem;
  padding-top: 0.7rem;
  border-top: 1px solid var(--border);
  line-height: 1.6;
}
.word-problem {
  margin-top: 0.8rem;
  padding: 1rem 1.15rem;
  border: 1px solid rgba(245, 184, 66, 0.30);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, rgba(245, 184, 66, 0.04), rgba(17, 19, 26, 0.5));
  position: relative;
}
.wp-badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.20em;
  color: var(--accent);
  background: rgba(245, 184, 66, 0.10);
  border: 1px solid rgba(245, 184, 66, 0.30);
  border-radius: 4px;
  padding: 2px 8px;
  margin-bottom: 0.65rem;
  text-transform: uppercase;
}
.wp-body {
  font-family: var(--ui);
  font-size: 0.96rem;
  color: var(--text);
  line-height: 1.65;
}
.wp-body strong { color: var(--gold); font-weight: 600; }
.wp-body em { color: var(--teal); font-style: normal; font-weight: 500; }

/* Q analysis block */
.q-analysis {
  margin-top: 0.65rem;
  padding: 0.85rem 1.05rem;
  border: 1px dashed rgba(45, 212, 191, 0.40);
  border-radius: var(--radius-sm);
  background: rgba(45, 212, 191, 0.04);
}
.qa-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  display: flex; align-items: center; gap: 0.4rem;
}
.qa-body {
  font-family: var(--ui);
  font-size: 0.92rem;
  color: var(--text);
  line-height: 1.6;
}
.qa-body .qa-eq { display: block; text-align: center; margin: 0.4rem 0; }
.qa-body strong { color: var(--gold); }
.qa-arrow { color: var(--teal); font-weight: 600; }

/* Q-shift interactive */
.qshift-prose {
  font-family: var(--ui);
  font-size: 0.94rem;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 0.75rem;
}
.qshift-row {
  display: flex; flex-wrap: wrap;
  align-items: center;
  gap: 0.7rem;
  margin: 0.6rem 0;
  font-size: 0.94rem;
}
.qshift-label {
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.74rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.qshift-input {
  font-family: var(--mono);
  font-size: 0.96rem;
  padding: 0.5rem 0.75rem;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  width: 11rem;
  transition: all var(--t-fast);
}
.qshift-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.qshift-input.incorrect { border-color: var(--red); background: rgba(232, 93, 79, 0.08); }
.qshift-input.correct { border-color: var(--teal); background: rgba(45, 212, 191, 0.06); }

.qshift-choices { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.qshift-choice {
  font-family: var(--mono);
  font-size: 0.82rem;
  letter-spacing: 0.06em;
  padding: 0.55rem 0.95rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-2);
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--t-fast);
  display: inline-flex; align-items: center; gap: 0.5rem;
}
.qshift-choice:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.qshift-choice.selected { background: rgba(245, 184, 66, 0.12); border-color: var(--accent); color: var(--accent); }
.qshift-choice.incorrect { border-color: var(--red); color: var(--red); background: rgba(232, 93, 79, 0.08); }

.qshift-submit { margin-top: 0.8rem; }
.qshift-locked-note {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--teal);
  margin-top: 0.6rem;
  letter-spacing: 0.04em;
}

.ph-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.ph-pill {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  padding: 0.45rem 0.8rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-2);
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--t-fast);
  text-transform: uppercase;
}
.ph-pill svg { width: 11px; height: 11px; }
.ph-pill:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

/* ============ STEPS PROGRESS ============ */
.steps-progress {
  display: flex;
  gap: 0;
  margin-bottom: 1.3rem;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  flex-wrap: wrap;
  padding: 0.6rem 0.8rem;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: relative;
}
.step-pill {
  padding: 0.45rem 0.7rem;
  color: var(--text-faint);
  position: relative;
  display: inline-flex; align-items: center; gap: 0.4rem;
  transition: color var(--t-fast);
}
.step-pill:not(:first-child)::before {
  content: ""; display: inline-block;
  width: 12px; height: 1px;
  background: var(--border-2);
  margin-right: 0.4rem;
}
.step-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border-2);
  transition: all var(--t-fast);
}
.step-pill.active { color: var(--accent); }
.step-pill.active .dot {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  animation: pulse 2s ease-in-out infinite;
}
.step-pill.done { color: var(--teal); }
.step-pill.done .dot { background: var(--teal); box-shadow: 0 0 6px var(--teal-glow); }

/* ============ ICE TABLE ============ */
.ice-section {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.4rem 1.5rem;
  margin-bottom: 1.1rem;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  gap: 1rem; flex-wrap: wrap;
}
.section-title {
  font-family: var(--display);
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text);
  display: flex; align-items: center; gap: 0.55rem;
}
.section-title .num {
  display: inline-grid; place-items: center;
  width: 22px; height: 22px;
  background: rgba(245, 184, 66, 0.10);
  border: 1px solid var(--accent);
  border-radius: 5px;
  font-family: var(--mono); font-size: 0.7rem; font-weight: 700;
  color: var(--accent);
}
.section-tag {
  font-family: var(--mono);
  font-size: 0.66rem;
  color: var(--text-faint);
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.ice-instructions {
  font-family: var(--ui);
  font-size: 0.86rem;
  color: var(--text-dim);
  margin: 0 0 0.85rem;
  line-height: 1.6;
  padding: 0.6rem 0.8rem;
  background: var(--bg-2);
  border-left: 2px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.ice-instructions strong { color: var(--accent); font-weight: 600; }
.ice-instructions em { color: var(--teal); font-style: normal; font-weight: 500; }
.ice-instructions code {
  font-family: var(--mono); font-size: 0.82rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0 5px;
}
.ice-instructions kbd {
  font-family: var(--mono); font-size: 0.78rem;
  background: var(--bg);
  border: 1px solid var(--border-2);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 6px;
}

.ice-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-family: var(--mono);
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.ice-table th, .ice-table td {
  padding: 0.55rem;
  border: 1px solid var(--border);
  text-align: center;
}
.ice-table thead th {
  background: var(--panel-2);
  color: var(--text);
  font-size: 0.92rem;
  font-weight: 600;
  padding: 0.7rem;
  font-family: var(--mono);
}
.ice-table thead th.row-label-col { background: transparent; border: none; width: 100px; }
.ice-table tbody th {
  background: var(--panel-3);
  font-family: var(--mono);
  letter-spacing: 0.14em;
  font-size: 0.7rem;
  color: var(--text-dim);
  font-weight: 600;
  padding: 0.5rem;
  width: 100px;
  text-transform: uppercase;
}
.ice-table tbody tr.row-locked th { color: var(--text-faint); opacity: 0.45; }
.ice-table tbody tr.row-locked td { background: rgba(17, 19, 26, 0.5); }
.ice-table tbody tr.row-active th {
  color: var(--accent);
  background: linear-gradient(90deg, rgba(245, 184, 66, 0.12), var(--panel-3));
  position: relative;
}
.ice-table tbody tr.row-active th::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

.ice-cell {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--mono);
  font-size: 1rem;
  text-align: center;
  padding: 0.6rem 0.45rem;
  outline: none;
  transition: all var(--t-fast);
  min-height: 38px;
}
.ice-cell:focus {
  border-color: var(--accent);
  background: rgba(245, 184, 66, 0.06);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.ice-cell.given {
  background: rgba(245, 184, 66, 0.06);
  color: var(--accent);
  cursor: not-allowed;
  font-weight: 700;
}
.ice-cell:disabled:not(.given) {
  background: rgba(17, 19, 26, 0.4);
  color: var(--text-faint);
  cursor: not-allowed;
}
.ice-cell.correct {
  background: rgba(45, 212, 191, 0.12);
  color: var(--teal);
  border-color: rgba(45, 212, 191, 0.35);
}
.ice-cell.correct.flash-correct { animation: flashCorrect 0.7s ease; }
.ice-cell.incorrect {
  border-color: var(--red);
  background: rgba(232, 93, 79, 0.10);
  color: var(--red);
  animation: shake 0.5s;
}

@keyframes flashCorrect {
  0%   { background: rgba(45, 212, 191, 0.50); box-shadow: 0 0 20px var(--teal-glow); }
  100% { background: rgba(45, 212, 191, 0.12); box-shadow: none; }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* ============ FEEDBACK ============ */
.feedback-bar {
  margin-top: 1rem;
  padding: 0.75rem 1.05rem;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--ui);
  font-size: 0.88rem;
  color: var(--text-dim);
  min-height: 46px;
  display: flex;
  align-items: center;
  gap: 0.65rem;
  transition: all 0.25s ease;
  border-left-width: 3px;
}
.feedback-bar.error   { border-color: var(--red);  color: var(--text); background: rgba(232, 93, 79, 0.06); border-left-color: var(--red); }
.feedback-bar.success { border-color: var(--teal); color: var(--text); background: rgba(45, 212, 191, 0.06); border-left-color: var(--teal); }
.feedback-bar.hint    { border-color: var(--accent); color: var(--text); background: rgba(245, 184, 66, 0.06); border-left-color: var(--accent); }
.feedback-icon {
  width: 22px; height: 22px;
  display: grid; place-items: center;
  border-radius: 5px;
  background: var(--panel-2);
  flex-shrink: 0;
  font-family: var(--mono); font-weight: 700;
  font-size: 0.85rem;
}
.feedback-bar.error   .feedback-icon { background: rgba(232, 93, 79, 0.15); color: var(--red); }
.feedback-bar.success .feedback-icon { background: rgba(45, 212, 191, 0.15); color: var(--teal); }
.feedback-bar.hint    .feedback-icon { background: rgba(245, 184, 66, 0.15); color: var(--accent); }

/* ============ CONTROLS / BUTTONS ============ */
.controls-row {
  display: flex;
  gap: 0.55rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}
.btn {
  font-family: var(--mono);
  font-size: 0.74rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  padding: 0.6rem 1rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-2);
  background: var(--panel-2);
  color: var(--text);
  cursor: pointer;
  transition: all var(--t-fast);
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  text-transform: uppercase;
}
.btn svg { width: 13px; height: 13px; }
.btn:hover { background: var(--panel-3); border-color: var(--accent); transform: translateY(-1px); color: var(--accent); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-primary {
  background: linear-gradient(135deg, var(--accent-bright), var(--accent));
  color: #1a1208;
  border-color: var(--accent);
  box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-primary:hover { color: #1a1208; filter: brightness(1.08); box-shadow: 0 6px 20px var(--accent-glow); }

.btn-amber { color: var(--accent); border-color: rgba(245, 184, 66, 0.40); }
.btn-amber:hover { background: rgba(245, 184, 66, 0.10); color: var(--accent); }
.btn-danger { color: var(--red); border-color: rgba(232, 93, 79, 0.40); }
.btn-danger:hover { background: rgba(232, 93, 79, 0.10); color: var(--red); }
.btn-ghost { background: transparent; border-color: var(--border); color: var(--text-dim); }
.btn-ghost:hover { color: var(--text); }
.btn-purple { color: var(--purple); border-color: rgba(184, 130, 94, 0.40); }
.btn-purple:hover { background: rgba(184, 130, 94, 0.10); color: var(--purple); }

/* ============ STEPS ============ */
.step {
  background: var(--panel);
  border: 1px solid transparent;
  border-radius: var(--radius-lg);
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  margin-bottom: 0;
  transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.4s ease, margin 0.4s ease, border-color 0.4s ease;
}
.step.unlocked {
  opacity: 1;
  max-height: 2200px;
  padding: 1.4rem 1.5rem;
  border-color: var(--border);
  margin-bottom: 1.1rem;
  animation: fadeUp 0.45s ease;
}
.step.completed {
  border-color: rgba(45, 212, 191, 0.35);
  background: linear-gradient(135deg, rgba(45, 212, 191, 0.03), var(--panel));
}

/* ============ K BUILDER ============ */
.k-builder {
  display: flex;
  align-items: center;
  gap: 1.1rem;
  font-family: var(--mono);
  flex-wrap: wrap;
  margin-top: 0.7rem;
}
.k-symbol { font-family: var(--display); font-size: 1.5rem; color: var(--accent); font-weight: 700; }
.k-fraction {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
  flex: 1;
  min-width: 280px;
}
.k-zone {
  min-height: 56px;
  background: var(--bg-2);
  border: 2px dashed var(--border-2);
  border-radius: var(--radius-sm);
  padding: 0.55rem;
  display: flex; flex-wrap: wrap; gap: 0.45rem;
  align-items: center; justify-content: center;
  transition: all var(--t-fast);
}
.k-zone.has-content { border-style: solid; border-color: var(--border-2); }
.k-zone.empty-hint::before {
  content: attr(data-placeholder);
  color: var(--text-faint); font-size: 0.85rem; letter-spacing: 0.04em;
  font-family: var(--mono);
}
.k-zone.empty-hint.has-content::before { display: none; }
.k-divider { height: 2px; background: var(--accent); border-radius: 2px; box-shadow: 0 0 8px var(--accent-glow); }
.k-pill {
  display: inline-flex; align-items: center;
  background: var(--panel-3);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  padding: 0.3rem 0.6rem;
  font-size: 0.95rem;
  gap: 0.4rem;
  color: var(--text);
  transition: all var(--t-fast);
}
.k-pill:hover { border-color: var(--accent); }
.k-pill .pill-species { font-weight: 700; }
.k-pill .pill-exp { font-size: 0.75rem; vertical-align: super; color: var(--accent); }
.k-pill .pill-controls { display: flex; gap: 2px; margin-left: 0.3rem; }
.k-pill button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 22px; height: 22px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: var(--mono);
  display: grid; place-items: center;
  transition: all var(--t-fast);
}
.k-pill button:hover { background: var(--bg); color: var(--accent); border-color: var(--accent); }

.species-palette {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
  margin-top: 1.1rem; padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.palette-label {
  font-family: var(--mono); font-size: 0.66rem;
  color: var(--text-faint); letter-spacing: 0.18em;
  width: 100%; margin-bottom: 0.3rem;
  text-transform: uppercase;
}
.species-btn-group {
  display: inline-flex;
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: all var(--t-fast);
}
.species-btn-group:hover { border-color: var(--accent); }
.species-btn {
  background: var(--panel-2); border: none; color: var(--text);
  padding: 0.5rem 0.75rem;
  font-family: var(--mono); font-size: 0.76rem;
  cursor: pointer; transition: all var(--t-fast);
  letter-spacing: 0.06em;
}
.species-btn:hover { background: var(--panel-3); color: var(--accent); }
.species-btn.add-num { border-right: 1px solid var(--border-2); }
.species-btn-group .formula {
  padding: 0.5rem 0.75rem; background: var(--bg-2);
  color: var(--accent); border-right: 1px solid var(--border-2);
  font-weight: 700;
}

/* ============ SOLVE FOR X ============ */
.solve-form { display: flex; align-items: center; gap: 0.85rem; margin-top: 0.7rem; flex-wrap: wrap; }
.solve-label { font-family: var(--mono); font-size: 1rem; color: var(--text-dim); }
.solve-input {
  background: var(--bg-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  padding: 0.6rem 0.85rem;
  color: var(--text);
  font-family: var(--mono); font-size: 1rem;
  width: 190px; outline: none; transition: all var(--t-fast);
}
.solve-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.solve-input.correct   { border-color: var(--teal); color: var(--teal); }
.solve-input.incorrect { border-color: var(--red);  color: var(--red); animation: shake 0.5s; }
.solve-hint { font-family: var(--mono); font-size: 0.76rem; color: var(--text-faint); margin-top: 0.55rem; }

/* ============ APPROX BADGE ============ */
.approx-result { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.4rem; }
.approx-badge {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.55rem 1rem; border-radius: var(--radius-sm);
  font-family: var(--mono); font-size: 0.82rem; font-weight: 700; letter-spacing: 0.06em;
  align-self: flex-start;
  text-transform: uppercase;
}
.approx-badge.valid   { background: rgba(45, 212, 191, 0.12); color: var(--teal); border: 1px solid var(--teal); box-shadow: 0 0 18px var(--teal-glow); }
.approx-badge.invalid { background: rgba(232, 93, 79, 0.12); color: var(--red);  border: 1px solid var(--red);  box-shadow: 0 0 18px var(--red-glow); }
.approx-explanation { font-family: var(--ui); font-size: 0.92rem; color: var(--text-dim); line-height: 1.6; }

/* ============ FINISHED ============ */
.problem-finished {
  background: linear-gradient(135deg, rgba(45, 212, 191, 0.06), rgba(245, 184, 66, 0.04));
  border: 1px solid rgba(45, 212, 191, 0.40);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 1.1rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.problem-finished::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, var(--teal-glow), transparent 70%);
  opacity: 0.4;
}
.problem-finished > * { position: relative; z-index: 1; }
.finished-tag {
  font-family: var(--mono); font-size: 0.7rem;
  letter-spacing: 0.22em;
  color: var(--teal);
  text-transform: uppercase;
}
.finished-stars { display: flex; justify-content: center; gap: 0.5rem; margin: 0.7rem 0; }
.finished-stars .star {
  width: 32px; height: 32px;
  color: var(--text-faint);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.finished-stars .star.earned { color: var(--gold); filter: drop-shadow(0 0 12px var(--gold-glow)); }

.solution-annot {
  margin-top: 1rem;
  padding: 1.1rem 1.25rem;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--purple);
  border-radius: var(--radius-sm);
  font-family: var(--ui); font-size: 0.92rem;
  line-height: 1.65; color: var(--text-dim);
  text-align: left;
}
.solution-annot strong { color: var(--purple); display: block; margin-bottom: 0.55rem; letter-spacing: 0.10em; font-family: var(--mono); font-size: 0.74rem; text-transform: uppercase; }

.next-cta {
  display: flex; gap: 0.6rem; justify-content: center; margin-top: 1.1rem;
  flex-wrap: wrap;
}

/* ============ MODAL ============ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(8, 9, 12, 0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: grid; place-items: center;
  z-index: 100;
  animation: fadeIn 0.3s ease;
  padding: 1rem;
}
.modal-backdrop[hidden] { display: none; }
.modal-content {
  background: linear-gradient(135deg, var(--panel-2), var(--panel));
  border: 1px solid var(--border-2);
  border-radius: var(--radius-lg);
  padding: 2.2rem 2.5rem;
  text-align: center;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 80px var(--accent-glow);
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}
.modal-content::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.modal-content h2 {
  font-family: var(--display);
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.005em;
  margin-bottom: 0.7rem;
  color: var(--text);
}
.modal-content h2 .grad {
  background: linear-gradient(90deg, var(--accent-bright), var(--accent));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal-content p { font-family: var(--ui); color: var(--text-dim); margin-bottom: 1.2rem; line-height: 1.55; font-size: 0.93rem; }
.star-burst { margin: 0.9rem 0; display: flex; justify-content: center; gap: 0.6rem; }
.star-burst .star {
  width: 42px; height: 42px;
  color: var(--text-faint);
  display: inline-block; transform: scale(0);
  animation: starPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.star-burst .star.earned { color: var(--gold); filter: drop-shadow(0 0 20px var(--gold-glow)); }
.star-burst .star:nth-child(1) { animation-delay: 0.1s; }
.star-burst .star:nth-child(2) { animation-delay: 0.3s; }
.star-burst .star:nth-child(3) { animation-delay: 0.5s; }
.modal-streak {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: var(--mono); font-size: 0.86rem;
  color: var(--orange); margin: 0.3rem 0 0.8rem;
  background: rgba(237, 125, 58, 0.10);
  border: 1px solid rgba(237, 125, 58, 0.40);
  border-radius: 999px; padding: 0.35rem 0.9rem;
  letter-spacing: 0.04em;
}
.modal-streak svg { width: 14px; height: 14px; }
.modal-actions { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes starPop { 0% { transform: scale(0) rotate(-180deg); } 60% { transform: scale(1.25) rotate(15deg); } 100% { transform: scale(1) rotate(0); } }

/* ============ TOAST ============ */
.toast-wrap {
  position: fixed;
  top: 84px;
  right: 1.2rem;
  display: flex; flex-direction: column; gap: 0.55rem;
  z-index: 80;
  pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 0.55rem;
  font-family: var(--mono);
  font-size: 0.84rem;
  padding: 0.75rem 1.05rem;
  border-radius: var(--radius-sm);
  background: var(--panel-2);
  border: 1px solid var(--accent);
  border-left-width: 3px;
  color: var(--accent);
  box-shadow: 0 10px 28px rgba(0,0,0,0.5), 0 0 18px var(--accent-glow);
  animation: toastIn 0.35s ease, toastOut 0.4s ease 2.6s forwards;
  letter-spacing: 0.04em;
}
.toast svg { width: 16px; height: 16px; flex-shrink: 0; }
.toast.flame { border-color: var(--orange); color: var(--orange); box-shadow: 0 10px 28px rgba(0,0,0,0.5), 0 0 18px var(--orange-glow); }
.toast.level { border-color: var(--purple); color: var(--purple); box-shadow: 0 10px 28px rgba(0,0,0,0.5), 0 0 18px var(--purple-glow); }
@keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

/* ============ RESPONSIVE ============ */
@media (max-width: 1000px) {
  .home-hero { grid-template-columns: 1fr; gap: 1.5rem; }
  .home-hero-art { width: 160px; height: 160px; margin: 0 auto; }
}
@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 71px; bottom: 0;
    width: 290px; z-index: 40;
    transform: translateX(-100%);
    border-right: 1px solid var(--border);
  }
  .layout:not(.sidebar-collapsed) .sidebar { transform: translateX(0); box-shadow: 12px 0 40px rgba(0,0,0,0.6); }
  .topbar { padding: 0.7rem 1rem; }
  .workspace { padding: 1.3rem 1rem 3rem; }
  .hud-chip .hud-stack { display: none; }
  .hud-chip { padding: 0.45rem; }
  .home-stats-row { grid-template-columns: repeat(2, 1fr); }
  .brand-sub { display: none; }
  .home-title { font-size: 2.2rem; }
  .problem-header { padding: 1.2rem; }
  .ice-section, .step.unlocked { padding: 1.1rem; }
  .modal-content { padding: 1.6rem 1.5rem; }
}

.katex { font-size: 1.04em; }
.katex-display { margin: 0.35rem 0; }

/* Print-friendly */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>

const CONC_CHOICES_TIER1 = [0.100, 0.200, 0.250, 0.500, 1.000];
const CONC_CHOICES_TIER2 = [0.025, 0.050, 0.075, 0.100, 0.125, 0.150, 0.200, 0.250, 0.300, 0.400, 0.500, 0.750, 1.000];
const CONC_CHOICES_TIER3 = [0.0125, 0.0150, 0.0185, 0.0250, 0.0375, 0.0425, 0.0625, 0.0850, 0.1175, 0.1750, 0.2150, 0.2625, 0.3375, 0.4250, 0.6125, 0.8125];
function pickConc(tier) {
 const pool = tier <= 1 ? CONC_CHOICES_TIER1
 : tier === 2 ? CONC_CHOICES_TIER2
 : CONC_CHOICES_TIER3;
 return pool[Math.floor(Math.random() * pool.length)];
}
function pickFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

let problemCounter = 0;

function categoryFor(type) {
 return ({
 'weak-acid':'Weak Acid',
 'weak-base':'Weak Base',
 'ksp-1-1':'Ksp · 1:1',
 'ksp-1-2':'Ksp · 1:2',
 'ksp-2-1':'Ksp · 2:1',
 'ksp-1-3':'Ksp · 1:3',
 'ksp-3-2':'Ksp · 3:2',
 'buffer':'Buffer'
 })[type];
}

// Map current player level → max difficulty tier the bank should serve.
// Aggressive ramp so students see real challenge fast:
// Lvl 1 → tier 1, Lvl 2 → tier 2, Lvl 3+ → tier 3.
function currentMaxTier() {
 const lvl = (typeof levelInfo === 'function') ? levelInfo().level : 1;
 if (lvl <= 1) return 1;
 if (lvl <= 2) return 2;
 return 3;
}

// Within the available bank, weight harder tiers more heavily so the
// hardest unlocked tier dominates instead of being diluted by easier ones.
// Weight = 1 for tier 1, 2 for tier 2, 4 for tier 3.
function pickFromBankWeighted(bank) {
 if (!bank || !bank.length) return null;
 const weightFor = (t) => {
 const tier = t.tier || 1;
 return tier === 3 ? 4 : (tier === 2 ? 2 : 1);
 };
 let total = 0;
 for (const t of bank) total += weightFor(t);
 let r = Math.random() * total;
 for (const t of bank) {
 r -= weightFor(t);
 if (r <= 0) return t;
 }
 return bank[bank.length - 1];
}

// Pool of types available at a given tier (used by 'random' and 'ksp' modes).
function typesForTier(maxTier) {
 const pool = ['weak-acid','weak-base','ksp-1-1','buffer'];
 if (maxTier >= 2) pool.push('ksp-1-2','ksp-2-1');
 if (maxTier >= 3) pool.push('ksp-1-3','ksp-3-2');
 return pool;
}
function kspTypesForTier(maxTier) {
 const pool = ['ksp-1-1'];
 if (maxTier >= 2) pool.push('ksp-1-2','ksp-2-1');
 if (maxTier >= 3) pool.push('ksp-1-3','ksp-3-2');
 return pool;
}

function generateProblem(mode) {
 const maxTier = currentMaxTier();

 let type;
 if (mode === 'random' || mode === 'word-problem') {
 // Word-problem mode draws from the same type pool as Island Tour, but
 // every problem is wrapped in narrative regardless of tier.
 type = pickFrom(typesForTier(maxTier));
 } else if (mode === 'ksp') {
 type = pickFrom(kspTypesForTier(maxTier));
 } else {
 type = mode;
 }

 // Filter the bank by current tier ceiling.
 let bank = (COMPOUNDS[type] || []).filter(t => (t.tier || 1) <= maxTier);
 if (bank.length === 0) bank = COMPOUNDS[type] || [];

 // Pick a template, avoiding the last 4 used (cross-type history) so the
 // same compound doesn't recur for a while. Weighted toward higher tiers.
 if (!Array.isArray(state._recentTemplateKeys)) state._recentTemplateKeys = [];
 let tmpl = pickFromBankWeighted(bank);
 let tries = 0;
 while (tries < 12 && bank.length > 1 && state._recentTemplateKeys.includes(tmpl.name + tmpl.formula)) {
 tmpl = pickFromBankWeighted(bank);
 tries++;
 }
 state._recentTemplateKeys.unshift(tmpl.name + tmpl.formula);
 if (state._recentTemplateKeys.length > 6) state._recentTemplateKeys.length = 6;
 state._lastTemplateKey = tmpl.name + tmpl.formula;
 const tmplTier = tmpl.tier || 1;

 const id = 'gen_' + (++problemCounter) + '_' + Date.now();
 let initialConc = 0;
 let bufferA = null;

 if (type === 'weak-acid' || type === 'weak-base') {
 initialConc = pickConc(tmplTier);
 } else if (type === 'buffer') {
 initialConc = pickConc(tmplTier);
 bufferA = pickConc(tmplTier);
 // Avoid the degenerate case where HA and A⁻ are identical (pH = pKa exactly)
 let safety = 0;
 while (bufferA === initialConc && safety < 6) { bufferA = pickConc(tmplTier); safety++; }
 }

 // Build species array with concrete initial values
 const species = tmpl.species.map(s => ({ ...s, initial: 0 }));
 if (type === 'weak-acid' || type === 'weak-base') {
 const reactant = species.find(s => s.kind === 'reactant');
 if (reactant) reactant.initial = initialConc;
 } else if (type === 'buffer') {
 const ha = species.find(s => s.key === 'HA');
 const a = species.find(s => s.key === 'A');
 if (ha) ha.initial = initialConc;
 if (a) a.initial = bufferA;
 }

 const Ksymbol = type.startsWith('ksp') ? 'K_{sp}'
 : (type === 'weak-base') ? 'K_b' : 'K_a';

 const forceWordProblem = (mode === 'word-problem') || (tmplTier >= 3);
 const givenTeX = forceWordProblem
 ? buildWordProblem(type, tmpl, initialConc, bufferA, Ksymbol)
 : buildGivenTeX(type, tmpl, initialConc, bufferA, Ksymbol);

 const reactant = species.find(s => s.kind === 'reactant');
 let answerLabel;
 if (type === 'weak-acid') answerLabel = `x = [\\mathrm{H^+}]`;
 else if (type === 'weak-base') answerLabel = `x = [\\mathrm{OH^-}]`;
 else if (type === 'buffer') answerLabel = `x = [\\mathrm{H^+}]`;
 else if (type.startsWith('ksp')) {
 // Only the ion with stoichiometric coefficient 1 directly equals x.
 // For 3:2 stoichiometry, neither ion matches x, label it as molar solubility.
 const oneIon = species.find(s => s.coef === 1);
 answerLabel = oneIon ? `s = [${oneIon.tex}]` : 's \\;\\text{(molar solubility, mol/L)}';
 }

 return {
 id, type, tier: tmplTier,
 name: tmpl.name,
 formula: tmpl.formula,
 category: categoryFor(type),
 Ksymbol,
 Kvalue: tmpl.Kvalue,
 initialConc,
 bufferA,
 reactionTeX: tmpl.reactionTeX,
 givenTeX,
 species,
 answerLabel,
 conjugateName: tmpl.conjugateName
 };
}

function formulaToTeX(f) {
 return f
 .replace(/₀/g,'_0').replace(/₁/g,'_1').replace(/₂/g,'_2').replace(/₃/g,'_3').replace(/₄/g,'_4')
 .replace(/₅/g,'_5').replace(/₆/g,'_6').replace(/₇/g,'_7').replace(/₈/g,'_8').replace(/₉/g,'_9')
 .replace(/⁻/g,'^-').replace(/⁺/g,'^+');
}

function buildGivenTeX(type, tmpl, initialConc, bufferA, Ksymbol) {
 const Ktex = `${Ksymbol} = ${formatSci(tmpl.Kvalue)}`;
 const reactant = tmpl.species.find(s => s.kind === 'reactant');
 const reactantTex = reactant ? reactant.tex : '';
 if (type === 'weak-acid' || type === 'weak-base') {
 return `$${Ktex}$, &nbsp; initial $[${reactantTex}] = ${initialConc.toFixed(3)}$ M`;
 }
 if (type === 'buffer') {
 return `$${Ktex}$. Solution: $${initialConc.toFixed(3)}$ M $${reactantTex}$ + $${bufferA.toFixed(3)}$ M ${tmpl.conjugateName || 'conjugate salt'} (common-ion buffer).`;
 }
 if (type.startsWith('ksp')) {
 return `$${Ktex}$. Solve for the molar solubility of $\\mathrm{${formulaToTeX(tmpl.formula)}}$ in pure water.`;
 }
 return '';
}

/* =====================================================
 TIER 3 WORD PROBLEMS
 Tropical-flavored narrative scenarios that wrap the same numbers
 in a real-world prompt. The student still has to extract C₀ / K
 from the prose before filling the RICE table.
 ===================================================== */
const WORD_PROBLEM_SCENARIOS = {
 'weak-acid': [
 ({tmpl, initialConc, Ktex, reactantTex}) =>

/* =====================================================
 Q vs K SHIFT ANALYSIS
 Helps students see which direction the reaction must
 proceed before they fill in the ICE table's Change row.
 ===================================================== */
function buildQAnalysis(type, tmpl, initialConc, bufferA, Ksymbol) {
 const species = tmpl.species || [];
 const reactants = species.filter(s => s.kind === 'reactant');
 const products = species.filter(s => s.kind === 'product');
 if (!products.length) return '';

 const initialOf = (s) => {
 if (s.kind === 'product') {
 if (type === 'buffer' && s.key === 'A') return bufferA;
 return 0;
 }
 if (s.kind === 'reactant') return initialConc;
 return 0;
 };

 const sym = (s) => s.coef === 1 ? `[${s.tex}]` : `[${s.tex}]^{${s.coef}}`;
 const sub = (s) => {
 const v = initialOf(s);
 const txt = v === 0 ? '0' : v.toFixed(3);
 return s.coef === 1 ? `(${txt})` : `(${txt})^{${s.coef}}`;
 };

 const isKsp = type.startsWith('ksp');
 // For Ksp, the solid is excluded from Q (already encoded, reactants array is empty for pure-solid templates, but guard anyway)
 const useDen = !isKsp && reactants.length > 0;

 const numSym = products.map(sym).join('');
 const numSub = products.map(sub).join('');
 const denSym = useDen ? reactants.map(sym).join('') : '';
 const denSub = useDen ? reactants.map(sub).join('') : '';

 const Qexpr = useDen
 ? `Q = \\dfrac{${numSym}}{${denSym}} = \\dfrac{${numSub}}{${denSub}}`
 : `Q = ${numSym} = ${numSub}`;

 // Numeric Q from initial concentrations
 let numVal = 1;
 for (const s of products) numVal *= Math.pow(initialOf(s), s.coef);
 let Qval;
 if (useDen) {
 let denVal = 1;
 for (const s of reactants) denVal *= Math.pow(initialOf(s), s.coef);
 Qval = denVal === 0 ? Infinity : numVal / denVal;
 } else {
 Qval = numVal;
 }

 const K = tmpl.Kvalue;
 const QvalStr = (Qval === 0) ? '0' : (!isFinite(Qval) ? '\\infty' : formatSci(Qval));
 const KvalStr = formatSci(K);

 let cmp, direction, explain;
 if (Qval < K) {
 cmp = '<';
 direction = 'forward (→)';
 if (isKsp) {
 explain = `Since $Q < ${Ksymbol}$, the solid <strong>dissolves</strong>, ion concentrations grow ($+x$ for each product) until $Q$ rises to meet $${Ksymbol}$.`;
 } else if (type === 'buffer') {
 explain = `Since $Q < ${Ksymbol}$, the reaction shifts <strong>right</strong>. In the ICE table: HA decreases by $x$, while $[\\mathrm{H^+}]$ and $[\\mathrm{A^-}]$ each increase by $x$ (on top of the conjugate already present).`;
 } else {
 explain = `Since $Q < ${Ksymbol}$, the reaction shifts <strong>right</strong> to form products. In the ICE table, the reactant gets $-x$ and each product gets $+x$ until $Q$ climbs to equal $${Ksymbol}$.`;
 }
 } else if (Qval > K) {
 cmp = '>';
 direction = 'reverse (←)';
 explain = `Since $Q > ${Ksymbol}$, the reaction shifts <strong>left</strong>, products convert back to reactant ($-x$ for products, $+x$ for the reactant) until $Q$ drops to $${Ksymbol}$.`;
 } else {
 cmp = '=';
 direction = 'no net change';
 explain = `$Q$ already equals $${Ksymbol}$, so the system is at equilibrium and no shift is needed.`;
 }

 return `<div class="q-analysis">
 <div class="qa-label"> Step 1 · Compare $Q$ to $${Ksymbol}$ to find the shift direction</div>
 <div class="qa-body">
 <span class="qa-eq">$${Qexpr} = ${QvalStr}$</span>
 <span class="qa-eq">$Q = ${QvalStr}\\;${cmp}\\;${Ksymbol} = ${KvalStr}$ &nbsp;⇒&nbsp; reaction proceeds <strong class="qa-arrow">${direction}</strong></span>
 ${explain}
 </div>
 </div>
 `;
}

/* =====================================================
 Q-SHIFT STEP, interactive
 The student must compute Q (numeric) and pick a direction
 before the RICE table unlocks.
 ===================================================== */
function computeQAnswer(p) {
 const species = p.species;
 const reactants = species.filter(s => s.kind === 'reactant');
 const products = species.filter(s => s.kind === 'product');
 const isKsp = p.type.startsWith('ksp');
 let num = 1;
 for (const s of products) num *= Math.pow(s.initial || 0, s.coef);
 let Q;
 if (!isKsp && reactants.length) {
 let den = 1;
 for (const s of reactants) den *= Math.pow(s.initial || 0, s.coef);
 Q = den === 0 ? Infinity : num / den;
 } else {
 Q = num;
 }
 let direction;
 if (Q < p.Kvalue) direction = 'forward';
 else if (Q > p.Kvalue) direction = 'reverse';
 else direction = 'none';
 return { Q, direction };
}

 const isKsp = p.type.startsWith('ksp');
 const sym = (s) => s.coef === 1 ? `[${s.tex}]` : `[${s.tex}]^{${s.coef}}`;
 const numSym = products.map(sym).join('');
 const denSym = (!isKsp && reactants.length) ? reactants.map(sym).join('') : '';
 const Qexpr = denSym ? `Q = \\dfrac{${numSym}}{${denSym}}` : `Q = ${numSym}`;

 : `Initial: reactant = <strong>${p.initialConc.toFixed(3)} M</strong>, products = <strong>0 M</strong>.`);

 const selected = ps.qShift.directionAttempt || '';
 const valVal = ps.qShift.valueAttempt || '';
 body.innerHTML = `<div class="qshift-prose">

 </div>
 <div class="qshift-row">
 <span class="qshift-label">Direction of shift</span>
 <div class="qshift-choices">
 <button class="qshift-choice ${selected==='forward'?'selected':''}" data-dir="forward">→ FORWARD</button>

 <button class="qshift-choice ${selected==='none'?'selected':''}" data-dir="none">= NO CHANGE</button>
 </div>
 </div>
 <button class="btn qshift-submit" id="qShiftSubmit">✓ SUBMIT</button>
 <div class="qshift-locked-note">The Initial row of the ICE table unlocks once Q and direction are both correct.</div>
 `;
 renderInlineMath(body);

 $$('#qShiftBody .qshift-choice').forEach(btn => {

 ps.qShift.directionAttempt = btn.dataset.dir;

function onQShiftSubmit() {
 const p = getCurrent();
 const ps = getCurrentPS();
 if (!ps.qShift || ps.qShift.done) return;

 const { Q: expectedQ, direction: expectedDir } = computeQAnswer(p);
 const rawVal = (ps.qShift.valueAttempt || '').trim();
 const parsed = rawVal === '' ? NaN : parseFloat(rawVal);
 const valueOk = Number.isFinite(parsed) &&
 (expectedQ === 0
 ? Math.abs(parsed) < 1e-12
 : Math.abs(parsed - expectedQ) / Math.max(Math.abs(expectedQ), 1e-30) < 0.02);
 const dirOk = ps.qShift.directionAttempt === expectedDir;

 const input = $('#qShiftValue');
 if (input) {
 input.classList.remove('correct', 'incorrect');
 input.classList.add(valueOk ? 'correct' : 'incorrect');
 }
 $$('#qShiftBody .qshift-choice').forEach(b => {
 b.classList.remove('incorrect');
 if (!dirOk && b.dataset.dir === ps.qShift.directionAttempt) b.classList.add('incorrect');
 });

 if (!valueOk && !dirOk) {
 setFeedback('✗ Both Q and direction are off. Hint: with no products present, the numerator of Q is 0.', 'error');
 return;
 }
 if (!valueOk) {
 setFeedback('✗ Q value is off. Substitute the initial concentrations, any product term times zero is zero.', 'error');
 return;
 }
 if (!dirOk) {
 setFeedback(`✗ Direction is off. Compare $Q = ${rawVal}$ to $${p.Ksymbol} = ${formatSci(p.Kvalue)}$, which side needs to grow?`, 'error');
 renderInlineMath($('#feedbackBar'));
 return;
 }

 // Both correct, unlock the Initial row and re-render the Q step as worked solution.
 ps.qShift.done = true;
 ps.rowStatus.initial = 'active';
 setFeedback('✓ Shift predicted correctly. Now fill the Initial row of the ICE table.', 'success');
 renderQShiftStep();
 renderICETable();
 attachIceEvents();
 renderStepsProgress();
 updateButtonStates();
 setTimeout(() => $('#iceTable').scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
}

/* =====================================================
 X-VALUE COMPUTATION
 ===================================================== */
function trueX(p) {
 if (p.type === 'weak-acid' || p.type === 'weak-base') {
 const C = p.initialConc, K = p.Kvalue;
 return (-K + Math.sqrt(K*K + 4*K*C)) / 2;
 }
 if (p.type === 'buffer') {
 return p.Kvalue * p.initialConc / p.bufferA;
 }
 if (p.type === 'ksp-1-1') return Math.sqrt(p.Kvalue);
 // Same algebra (4x³ = K) for both 1:2 and 2:1 stoichiometries.
 if (p.type === 'ksp-1-2' || p.type === 'ksp-2-1') return Math.cbrt(p.Kvalue / 4);
 // 1:3 stoichiometry → K = 27x⁴
 if (p.type === 'ksp-1-3') return Math.pow(p.Kvalue / 27, 0.25);
 // 3:2 stoichiometry → K = 108x⁵
 if (p.type === 'ksp-3-2') return Math.pow(p.Kvalue / 108, 0.2);
 return 0;
}
function approxX(p) {
 if (p.type === 'weak-acid' || p.type === 'weak-base') {
 return Math.sqrt(p.Kvalue * p.initialConc);
 }
 return trueX(p);
}
function approximationValid(p) {
 if (p.type === 'weak-acid' || p.type === 'weak-base') {
 return (approxX(p) / p.initialConc) < 0.05;
 }
 if (p.type === 'buffer') return true;
 return null;
}

function buildNarrative(p, x) {
 if (p.type === 'weak-acid') {
 const valid = approximationValid(p);
 const ratio = (x / p.initialConc) * 100;
 if (valid) {
 return `Set up: $K_a = \\dfrac{x^2}{${p.initialConc} - x} \\approx \\dfrac{x^2}{${p.initialConc}}$.<br>` +
 `$x = \\sqrt{(${formatSci(p.Kvalue)})(${p.initialConc})} \\approx ${formatSci(x)}$ M. Approximation valid (${ratio.toFixed(2)}% < 5%).`;
 }
 return `Set up: $K_a = \\dfrac{x^2}{${p.initialConc} - x} = ${formatSci(p.Kvalue)}$.<br>` +
 `5% rule fails, solve the quadratic $x^2 + Kx - KC_0 = 0 \\Rightarrow x \\approx ${formatSci(x)}$ M.`;
 }
 if (p.type === 'weak-base') {
 return `Note: $\\mathrm{H_2O}$ is a pure liquid, omitted from $K_b$.<br>` +
 `Set up: $K_b = \\dfrac{x^2}{${p.initialConc} - x} \\approx \\dfrac{x^2}{${p.initialConc}}$.<br>` +
 `$x = \\sqrt{(${formatSci(p.Kvalue)})(${p.initialConc})} \\approx ${formatSci(x)}$ M.`;
 }
 if (p.type === 'buffer') {
 return `Common-ion effect: conjugate base starts at ${p.bufferA.toFixed(3)} M.<br>` +
 `$K_a = \\dfrac{x(${p.bufferA} + x)}{${p.initialConc} - x} \\approx \\dfrac{x \\cdot ${p.bufferA}}{${p.initialConc}}$.<br>` +
 `Therefore $x = K_a \\cdot \\dfrac{${p.initialConc}}{${p.bufferA}} = ${formatSci(x)}$ M $= [\\mathrm{H^+}]$, giving $\\mathrm{pH} = ${(-Math.log10(x)).toFixed(2)}$.`;
 }
 if (p.type === 'ksp-1-1') {
 return `Solid is omitted from $K_{sp}$. $K_{sp} = (x)(x) = x^2$.<br>` +
 `$x = \\sqrt{${formatSci(p.Kvalue)}} \\approx ${formatSci(x)}$ M = molar solubility.`;
 }
 if (p.type === 'ksp-1-2') {
 return `Stoichiometry: 1 mol salt → 1 mol cation + 2 mol anion.<br>` +
 `$K_{sp} = (x)(2x)^2 = 4x^3$.<br>` +
 `$x = \\sqrt[3]{${formatSci(p.Kvalue)}/4} \\approx ${formatSci(x)}$ M = molar solubility.`;
 }
 if (p.type === 'ksp-2-1') {
 return `Stoichiometry: 1 mol salt → 2 mol cation + 1 mol anion.<br>` +
 `$K_{sp} = (2x)^2(x) = 4x^3$.<br>` +
 `$x = \\sqrt[3]{${formatSci(p.Kvalue)}/4} \\approx ${formatSci(x)}$ M = molar solubility.`;
 }
 if (p.type === 'ksp-1-3') {
 return `Stoichiometry: 1 mol salt → 1 mol cation + 3 mol anion.<br>` +
 `$K_{sp} = (x)(3x)^3 = 27x^4$.<br>` +
 `$x = \\sqrt[4]{${formatSci(p.Kvalue)}/27} \\approx ${formatSci(x)}$ M = molar solubility.`;
 }
 if (p.type === 'ksp-3-2') {
 return `Stoichiometry: 1 mol salt → 3 mol cation + 2 mol anion.<br>` +
 `$K_{sp} = (3x)^3(2x)^2 = 108x^5$.<br>` +
 `$x = \\sqrt[5]{${formatSci(p.Kvalue)}/108} \\approx ${formatSci(x)}$ M = molar solubility.`;
 }
 return '';
}

/* =====================================================
 HELPERS
 ===================================================== */
function $(sel, root=document) { return root.querySelector(sel); }
function $$(sel, root=document) { return [...root.querySelectorAll(sel)]; }

function formatSci(num, sig=4) {
 if (num === 0) return '0';
 if (Math.abs(num) < 0.001 || Math.abs(num) >= 10000) {
 const exp = num.toExponential(sig - 1);
 return exp.replace(/e([+-]?\d+)/, (_, e) => ' \\times 10^{' + parseInt(e) + '}');
 }
 return parseFloat(num.toPrecision(sig)).toString();
}
function formatNum(num, sig=4) {
 if (num === 0) return '0';
 if (Math.abs(num) < 0.001 || Math.abs(num) >= 10000) {
 return num.toExponential(sig - 1);
 }
 return parseFloat(num.toPrecision(sig)).toString();
}

function parseExprWithX(str, xVal) {
 if (str === undefined || str === null) return NaN;
 let s = String(str).trim().replace(/\s+/g, '').replace(/−/g, '-').replace(/×/g, '*').replace(/·/g, '*');
 if (s === '') return NaN;
 s = s.replace(/(\d)e([+-]?\d)/gi, '$1E$2');
 s = s.replace(/(\d(?:\.\d+)?)x/gi, '$1*x');
 s = s.replace(/(^|[\+\-\*\/\(])x/gi, '$11*x');
 s = s.replace(/x/gi, '(' + xVal + ')');
 s = s.replace(/E/g, 'e');
 try {
 if (!/^[\d\.\+\-\*\/\(\)e]+$/i.test(s)) return NaN;
 const v = Function('"use strict";return (' + s + ')')();
 return Number.isFinite(v) ? v : NaN;
 } catch(e) { return NaN; }
}

function approxEqual(a, b, relTol=0.02, absTol=1e-12) {
 if (!Number.isFinite(a) || !Number.isFinite(b)) return false;
 const diff = Math.abs(a - b);
 if (diff <= absTol) return true;
 const scale = Math.max(Math.abs(a), Math.abs(b));
 return (diff / scale) <= relTol;
}

function expectedChange(species) {
 const sign = species.kind === 'reactant' ? -1 : 1;
 return sign * species.coef;
}
function expectedEqValue(species, xVal) {
 return species.initial + expectedChange(species) * xVal;
}

function renderInlineMath(el) {
 if (!el || !window.renderMathInElement) return;
 try {
 renderMathInElement(el, {
 delimiters: [
 {left: '$$', right: '$$', display: true},
 {left: '$', right: '$', display: false}
 ],
 throwOnError: false
 });
 } catch(e) {}
}

function onCellKey(e) {
 if (e.key === 'Enter' || e.key === 'Tab') {
 if (e.key === 'Enter') {
 e.preventDefault();
 e.target.blur();
 const all = $$('.ice-cell:not(:disabled)');
 const idx = all.indexOf(e.target);
 for (let i = idx + 1; i < all.length; i++) {
 if (!all[i].value) { all[i].focus(); return; }
 }
 for (let i = 0; i < idx; i++) {
 if (!all[i].value) { all[i].focus(); return; }
 }
 }
 }
}

function onCellBlur(e) {
 const input = e.target;
 const rowKey = input.dataset.row;
 const spKey = input.dataset.key;
 const raw = input.value.trim();
 if (raw === '') { input.classList.remove('correct', 'incorrect'); return; }
 const p = getCurrent();
 const ps = getCurrentPS();
 const sp = p.species.find(s => s.key === spKey);

 let correct = false;
 let feedback = '';
 const TEST_X = 2.7183;

 if (rowKey === 'initial') {
 const expected = sp.initial;
 const v = parseExprWithX(raw, 0);
 correct = approxEqual(v, expected, 0.005, 1e-8);
 if (!correct) {
 if (expected === 0 && v !== 0) feedback = `${sp.label} hasn't been added yet, initial concentration is 0.`;
 else feedback = `Initial [${sp.label}] should be ${formatNum(expected)} M.`;
 }
 } else if (rowKey === 'change') {
 const expectedCoeff = expectedChange(sp);
 const expectedVal = expectedCoeff * TEST_X;
 const v = parseExprWithX(raw, TEST_X);
 correct = approxEqual(v, expectedVal, 0.001, 1e-8);
 if (!correct) {
 const sign = sp.kind === 'reactant' ? '−' : '+';
 const c = sp.coef === 1 ? '' : sp.coef;
 feedback = `Change for ${sp.label}: it's a ${sp.kind}, so ${sign}${c}x (coefficient = ${sp.coef}).`;
 }
 } else if (rowKey === 'eq') {
 const expectedVal = expectedEqValue(sp, TEST_X);
 const v = parseExprWithX(raw, TEST_X);
 correct = approxEqual(v, expectedVal, 0.001, 1e-8);
 if (!correct) {
 const initStr = sp.initial === 0 ? '' : formatNum(sp.initial);
 const changeStr = (expectedChange(sp) >= 0 ? ' + ' : ' − ') + (sp.coef === 1 ? 'x' : sp.coef + 'x');
 const expr = (sp.initial === 0 ? changeStr.replace(/^ \+ /,'') : initStr + changeStr);
 feedback = `Equilibrium for ${sp.label} = Initial + Change = ${expr.trim()}.`;
 }
 }

 ps.rows[rowKey][spKey] = { value: raw, correct, incorrect: !correct };
 input.classList.remove('correct', 'incorrect', 'flash-correct');
 if (correct) {
 input.classList.add('correct', 'flash-correct');
 setTimeout(() => input.classList.remove('flash-correct'), 700);
 setFeedback(`✓ ${sp.label} ${rowLabel(rowKey)} correct.`, 'success');
 checkRowCompletion(rowKey);
 } else {
 input.classList.add('incorrect');
 setFeedback('✗ ' + feedback, 'error');
 }
 renderStepsProgress();
}

 return { initial: 'initial value', change: 'change', eq: 'equilibrium expression' }[key];

function checkRowCompletion(rowKey) {
 const p = getCurrent();
 const ps = getCurrentPS();
 const allCorrect = p.species.every(s => ps.rows[rowKey][s.key]?.correct);
 if (!allCorrect) return;
 ps.rowStatus[rowKey] = 'done';
 if (rowKey === 'initial') {
 ps.rowStatus.change = 'active';
 setFeedback('✓ Initial row complete. Now fill Change using x notation.', 'success');
 unlockRow('change');
 } else if (rowKey === 'change') {
 ps.rowStatus.eq = 'active';
 setFeedback('✓ Change row complete. Equilibrium = Initial + Change.', 'success');
 unlockRow('eq');

 ps.kExprLocked = false;
