 ${expDisplay}
 <span class="pill-controls">
 <button data-action="dec" title="decrement exponent">−</button>
 <button data-action="inc" title="increment exponent">+</button>
 <button data-action="del" title="remove">×</button>
 </span>
 </span>
 `;
}

function addToKZone(spKey, zone) {
 const ps = getCurrentPS();
 if (ps.kExprDone) return;
 const list = ps.kExpr[zone];
 const existing = list.find(it => it.key === spKey);
 if (existing) existing.exp += 1;
 else list.push({ key: spKey, exp: 1 });
 renderKExprStep();
}

function onKPillBtn(e) {
 const ps = getCurrentPS();
 if (ps.kExprDone) return;
 const pill = e.target.closest('.k-pill');
 const zone = pill.dataset.zone;
 const idx = +pill.dataset.idx;
 const action = e.target.dataset.action;
 const list = ps.kExpr[zone];
 if (action === 'inc') list[idx].exp += 1;
 else if (action === 'dec') {
 list[idx].exp -= 1;
 if (list[idx].exp <= 0) list.splice(idx, 1);
 }
 else if (action === 'del') list.splice(idx, 1);
 renderKExprStep();
}

function checkKExpression() {
 const p = getCurrent();
 const ps = getCurrentPS();
 const expected = expectedKExpression(p);
 const userNum = normalizeKList(ps.kExpr.num);
 const userDen = normalizeKList(ps.kExpr.den);
 const expNum = normalizeKList(expected.num);
 const expDen = normalizeKList(expected.den);
 if (userNum === expNum && userDen === expDen) {
 ps.kExprDone = true;
 ps.solveLocked = false;
 setFeedback('✓ K expression correct. Now solve for x.', 'success');
 renderKExprStep();
 renderSolveStep();
 renderStepsProgress();
 setTimeout(() => $('#stepSolve').scrollIntoView({ behavior:'smooth', block:'center' }), 200);
 } else {
 let msg = 'K expression not quite right. ';
 if (p.type.startsWith('ksp')) msg += 'For Ksp: only dissolved products appear, raised to their stoichiometric coefficient. Solid is omitted; no denominator.';
 else msg += 'Standard form: K = [products]^coef / [reactants]^coef. Pure liquids and solids are excluded.';
 setFeedback('✗ ' + msg, 'error');
 $('#kExprBody').animate(
 [{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],
 400);
 }
}

function expectedKExpression(p) {
 const num = [], den = [];
 p.species.forEach(s => {
 if (s.kind === 'product') num.push({ key: s.key, exp: s.coef });
 else if (s.kind === 'reactant') den.push({ key: s.key, exp: s.coef });
 });
 return { num, den };
}
function normalizeKList(list) {
 const m = {};
 list.forEach(it => { m[it.key] = (m[it.key] || 0) + it.exp; });
 return Object.keys(m).sort().map(k => k + '^' + m[k]).join(',');
}

/* =====================================================
 SOLVE FOR X
 ===================================================== */
function renderSolveStep() {
 const p = getCurrent();
 const ps = getCurrentPS();
 $('#stepSolve').classList.add('unlocked');
 if (ps.solveDone) $('#stepSolve').classList.add('completed');

 const x = trueX(p);
 let setup = '';
 if (p.type === 'weak-acid' || p.type === 'weak-base') {
 setup = `${p.Ksymbol} = \\dfrac{x^2}{${p.initialConc} - x}`;
 } else if (p.type === 'buffer') {
 setup = `K_a = \\dfrac{x \\cdot (${p.bufferA} + x)}{${p.initialConc} - x} \\approx \\dfrac{x \\cdot ${p.bufferA}}{${p.initialConc}}`;
 } else if (p.type === 'ksp-1-1') {
 setup = `K_{sp} = (x)(x) = x^2`;
 } else if (p.type === 'ksp-1-2') {
 setup = `K_{sp} = (x)(2x)^2 = 4x^3`;
 } else if (p.type === 'ksp-2-1') {
 setup = `K_{sp} = (2x)^2(x) = 4x^3`;
 } else if (p.type === 'ksp-1-3') {
 setup = `K_{sp} = (x)(3x)^3 = 27x^4`;
 } else if (p.type === 'ksp-3-2') {
 setup = `K_{sp} = (3x)^3(2x)^2 = 108x^5`;
 }

 $('#solveBody').innerHTML = `<div style="font-family:var(--mono); font-size:0.92rem; color:var(--text-dim); margin-bottom:0.5rem;">
 Substituting equilibrium values into the K expression:
 </div>
 <div id="solveSetup" style="padding:0.4rem 0;font-size:1.05rem;">$$${setup} = ${formatSci(p.Kvalue)}$$</div>
 <div class="solve-form">
 <div class="solve-label" id="solveLabel">$${p.answerLabel} = $</div>
 <input type="text" class="solve-input" id="solveInput" placeholder="e.g., 1.342e-3" autocomplete="off" spellcheck="false" ${ps.solveDone ? 'disabled' : ''} value="${ps.solveValue || ''}">
 <span style="font-family:var(--mono);color:var(--text-dim)">M</span>
 <button class="btn btn-primary" id="btnCheckSolve" ${ps.solveDone ? 'disabled' : ''}>✓ SUBMIT (Enter)</button>
 ${ps.solveDone ? `<span style="color:var(--accent);font-family:var(--mono)">✓ x = ${formatNum(x)}</span>` : ''}
 </div>
 <div class="solve-hint">Enter your answer in scientific notation (e.g., 1.342e-3). Tolerance: ±1%.</div>
 `;
 renderInlineMath($('#solveBody'));

 const input = $('#solveInput');
 if (input && !ps.solveDone) {
 input.focus();
 input.addEventListener('keydown', (e) => {
 if (e.key === 'Enter') { e.preventDefault(); checkSolve(); }
 });
 $('#btnCheckSolve').addEventListener('click', checkSolve);
 }
}

function checkSolve() {
 const p = getCurrent();
 const ps = getCurrentPS();
 const input = $('#solveInput');
 const v = parseExprWithX(input.value, 0);
 const expected = trueX(p);
 ps.solveValue = input.value;

 if (!Number.isFinite(v)) {
 input.classList.add('incorrect');
 setFeedback('Invalid number format. Try scientific notation (e.g., 1.5e-3).', 'error');
 return;
 }
 const approx = approxX(p);
 const closeTrue = Math.abs(v - expected) / expected < 0.01;
 const closeApprox = Math.abs(v - approx) / approx < 0.01 && approximationValid(p) !== false;

 if (closeTrue || closeApprox) {
 ps.solveDone = true;
 ps.approxShown = true;
 input.classList.remove('incorrect');
 input.classList.add('correct');
 setFeedback('✓ Correct value of x. Approximation analysis below.', 'success');
 renderSolveStep();
 renderApproxStep();
 renderStepsProgress();
 setTimeout(() => completeProblem(), 600);
 } else {
 input.classList.add('incorrect');
 setTimeout(() => input.classList.remove('incorrect'), 600);
 const hint = (p.type === 'weak-acid' || p.type === 'weak-base')
 ? `Try the approximation: $x \\approx \\sqrt{K \\cdot C_0}$. (If 5% rule fails, solve the quadratic.)`
 : (p.type.startsWith('ksp') ? `Solve algebraically from the Ksp expression.`
 : `For an HA/A⁻ buffer, $x \\approx K_a \\cdot [\\mathrm{HA}]/[\\mathrm{A^-}]$.`);
 setFeedback('✗ Not within ±1%. ' + hint, 'error');
 renderInlineMath($('#feedbackBar'));
 }
}

/* =====================================================
 APPROX
 ===================================================== */
function renderApproxStep() {
 const p = getCurrent();
 const ps = getCurrentPS();
 $('#stepApprox').classList.add('unlocked', 'completed');
 ps.approxShown = true;
 const x = trueX(p);
 let html = '';
 if (p.type === 'weak-acid' || p.type === 'weak-base') {
 const ratio = (x / p.initialConc) * 100;
 const valid = ratio < 5;
 html = `<div class="approx-result">
 <span class="approx-badge ${valid ? 'valid' : 'invalid'}">
 ${valid ? '✓' : '✗'} APPROXIMATION ${valid ? 'VALID' : 'INVALID'}
 </span>
 <div class="approx-explanation">
 $\\dfrac{x}{C_0} = \\dfrac{${formatSci(x)}}{${p.initialConc}} \\approx ${ratio.toFixed(2)}\\%$
 ${valid
 ? ` , less than 5%, so $C_0 - x \\approx C_0$ holds.`
 : ` , <em>greater than 5%</em>, approximation breaks down. Use the quadratic formula for accuracy.`}
 </div>
 </div>
 `;
 } else if (p.type === 'buffer') {
 html = `<div class="approx-result">
 <span class="approx-badge valid">✓ APPROXIMATION VALID</span>
 <div class="approx-explanation">
 With buffer concentrations $\\gg x$, $[\\mathrm{HA}] \\approx C_0$ and $[\\mathrm{A^-}] \\approx [\\mathrm{A^-}]_0$. This is why buffers resist pH change.
 </div>
 </div>
 `;
 } else {
 html = `<div class="approx-result">
 <span class="approx-badge valid">✓ EXACT SOLUTION</span>
 <div class="approx-explanation">
 For pure $K_{sp}$ dissolution, no approximation is needed, solve directly. $x$ is the molar solubility.
 </div>
 </div>
 `;
 }
 $('#approxBody').innerHTML = html;
 renderInlineMath($('#approxBody'));
}

/* =====================================================
 COMPLETE PROBLEM / STARS / GAME LOOP
 ===================================================== */
function computeStars(ps) {
 if (ps.solutionShown) return 1;
 if (ps.hintsTotal === 0) return 3;
 if (ps.hintsTotal === 1) return 2;
 return 1;
}

function completeProblem() {
 const p = getCurrent();
 const ps = getCurrentPS();
 if (ps.completed) return;
 ps.completed = true;
 ps.starsEarned = computeStars(ps);

 const prevLevel = levelInfo().level;

 // update stats
 state.stats.solved += 1;
 state.stats.totalStars += ps.starsEarned;
 if (ps.solutionShown) {
 state.stats.streak = 0;
 } else {
 state.stats.streak += 1;
 if (state.stats.streak > state.stats.bestStreak) state.stats.bestStreak = state.stats.streak;
 }
 if (ps.starsEarned === 3) state.stats.perfect += 1;

 // recent
 state.recent.unshift({ name: p.name, type: p.type, stars: ps.starsEarned, ts: Date.now() });
 if (state.recent.length > 12) state.recent.length = 12;

 saveState();

 const newLevel = levelInfo().level;
 if (newLevel > prevLevel) {
 showToast(`LEVEL ${newLevel}!`, 'level');
 }
 if (state.stats.streak > 0 && state.stats.streak % 5 === 0) {
 showToast(` ${state.stats.streak}-PROBLEM STREAK!`, 'flame');
 } else if (state.stats.streak === 3) {
 showToast(`STREAK x3!`, 'flame');
 }

 renderHUD();
 renderSidebar();
 renderFinishedStep();
 showCongratsModal(ps.starsEarned, p);
}

function renderFinishedStep() {
 const p = getCurrent();
 const ps = getCurrentPS();
 const x = trueX(p);
 const html = `<div class="problem-finished">
 <div style="font-family:var(--display);font-size:1rem;letter-spacing:0.14em;color:var(--accent);">★ PROBLEM COMPLETE ★</div>
 <div class="finished-stars">
 ${[1,2,3].map(i => `<span class="star ${i <= ps.starsEarned ? 'earned' : ''}">★</span>`).join('')}
 </div>
 <div style="font-family:var(--mono);color:var(--text-dim);margin-top:0.3rem;font-size:0.82rem;">
 Hints used: ${ps.hintsTotal} · Solution shown: ${ps.solutionShown ? 'yes' : 'no'}
 </div>
 <div class="next-cta">
 <button class="btn btn-primary" id="doneNext">▶ NEXT PROBLEM</button>
 <button class="btn btn-ghost" id="doneHome">↩ HOME</button>
 </div>
 </div>
 <div class="solution-annot">
 <strong>FULL SOLUTION</strong>
 ${buildNarrative(p, x)}
 </div>
 `;
 $('#stepDone').innerHTML = html;
 $('#stepDone').classList.add('unlocked');
 renderInlineMath($('#stepDone'));
 $('#doneNext').addEventListener('click', () => startNewProblem());
 $('#doneHome').addEventListener('click', () => renderHome());
}

function showCongratsModal(stars, p) {
 $('#modalTitle').textContent = stars === 3 ? 'PERFECT SOLVE' : (stars === 2 ? 'WELL DONE' : 'PROBLEM SOLVED');
 $('#modalText').innerHTML = `<strong style="color:var(--accent)">${p.name}</strong> , ${stars} of 3 stars earned. ${stars === 3 ? 'No hints, no peeks. Pure equilibrium mastery.' : (stars === 2 ? 'One hint used, close to a perfect run.' : 'Keep practicing, try another to sharpen the skill.')}`;
 const burst = $('#starBurst');
 burst.innerHTML = [1,2,3].map(i => `<span class="star ${i <= stars ? 'earned' : ''}">★</span>`).join('');
 const sw = $('#modalStreakWrap');
 if (state.stats.streak >= 2) {
 sw.innerHTML = `<div class="modal-streak"> ${state.stats.streak} in a row</div>`;
 } else {
 sw.innerHTML = '';
 }
 $('#modal').hidden = false;
}

$('#modalNext').addEventListener('click', () => {
 $('#modal').hidden = true;
 startNewProblem();
});
$('#modalHome').addEventListener('click', () => {
 $('#modal').hidden = true;
 renderHome();
});
document.addEventListener('keydown', (e) => {
 if (e.key === 'Escape' && !$('#modal').hidden) $('#modal').hidden = true;
});
$('#modal').addEventListener('click', (e) => {
 if (e.target.id === 'modal') $('#modal').hidden = true;
});

/* =====================================================
 TOAST
 ===================================================== */
function showToast(msg, kind='') {
 const t = document.createElement('div');
 t.className = 'toast' + (kind ? ' ' + kind : '');
 t.textContent = msg;
 $('#toastWrap').appendChild(t);
 setTimeout(() => t.remove(), 3200);
}

/* =====================================================
 HINTS / SOLUTION / RESET
 ===================================================== */
function currentStep(ps) {
 if (ps.completed) return 'done';
 if (ps.solveLocked === false && !ps.solveDone) return 'solve';
 if (ps.kExprLocked === false && !ps.kExprDone) return 'kExpr';
 if (ps.rowStatus.eq === 'active') return 'eq';
 if (ps.rowStatus.change === 'active') return 'change';
 if (ps.rowStatus.initial === 'active') return 'initial';
 if (ps.qShift && !ps.qShift.done) return 'qShift';
 return 'initial';
}

function onHint() {
 const p = getCurrent();
 const ps = getCurrentPS();
 if (ps.completed) return;
 const step = currentStep(ps);
 ps.hintsTotal += 1;
 ps.hintsByStep[step] = (ps.hintsByStep[step] || 0) + 1;
 setFeedback(getHintForStep(p, step), 'hint');
 renderInlineMath($('#feedbackBar'));
 updateButtonStates();
}

function getHintForStep(p, step) {
 if (step === 'qShift') {
 return `Hint: $Q$ uses the same formula as $${p.Ksymbol}$, but with <em>initial</em> concentrations. Since no products have formed yet (their initial concentrations are 0), the numerator is 0, so $Q = 0$. With $Q < ${p.Ksymbol}$, the reaction shifts <strong>forward</strong> to form products.`;
 }
 if (step === 'initial') {
 if (p.type.startsWith('ksp')) return `Hint: For Ksp dissolution starting from a solid in pure water, both ion concentrations begin at <strong>0 M</strong>.`;
 if (p.type === 'buffer') return `Hint: This is a buffer, both the weak acid AND its conjugate base are present initially. $[\\mathrm{H^+}]$ starts at 0.`;
 return `Hint: The reactant starts at the value given in the problem. Products are not yet formed, so they begin at <strong>0 M</strong>.`;
 }
 if (step === 'change') return `Hint: Reactants <em>decrease</em> by $-n x$ and products <em>increase</em> by $+n x$, where $n$ is the stoichiometric coefficient.`;
 if (step === 'eq') return `Hint: Equilibrium = Initial + Change. So a reactant becomes $C_0 - x$, and a product becomes $0 + x$ (or its initial value $+ x$ in a buffer).`;
 if (step === 'kExpr') {
 if (p.type.startsWith('ksp')) return `Hint: $K_{sp}$ has only dissolved species (products), each raised to its coefficient. Solid is omitted. No denominator.`;
 return `Hint: $K = \\dfrac{[\\mathrm{products}]^{\\text{coef}}}{[\\mathrm{reactants}]^{\\text{coef}}}$. Pure liquids ($\\mathrm{H_2O}$) are excluded.`;
 }
 if (step === 'solve') {
 if (p.type === 'weak-acid' || p.type === 'weak-base') {
 const validApprox = approximationValid(p);
 if (validApprox) return `Hint: Approximate $K \\approx x^2 / C_0 \\Rightarrow x \\approx \\sqrt{K \\cdot C_0} = \\sqrt{${formatSci(p.Kvalue)} \\cdot ${p.initialConc}}$.`;
 return `Hint: 5% rule fails here. Use the quadratic formula on $x^2 + Kx - KC_0 = 0$.`;
 }
 if (p.type === 'buffer') return `Hint: $x = K_a \\cdot \\dfrac{[\\mathrm{HA}]}{[\\mathrm{A^-}]} = ${formatSci(p.Kvalue)} \\cdot \\dfrac{${p.initialConc}}{${p.bufferA}}$.`;
 if (p.type === 'ksp-1-1') return `Hint: $K_{sp} = x^2$, so $x = \\sqrt{K_{sp}}$.`;
 if (p.type === 'ksp-1-2') return `Hint: $K_{sp} = (x)(2x)^2 = 4x^3$, so $x = \\sqrt[3]{K_{sp}/4}$.`;
 }
 return 'Hint: re-check the previous step.';
}

function updateButtonStates() {
 const ps = getCurrentPS();
 if (!ps) return;
 const step = currentStep(ps);
 const btnShowStep = $('#btnShowStep');
 if (!btnShowStep) return;
 const stepHints = ps.hintsByStep[step] || 0;
 if (stepHints >= 2 && (step === 'initial' || step === 'change' || step === 'eq')) {
 btnShowStep.style.display = 'inline-flex';
 btnShowStep.textContent = '▸ REVEAL ' + step.toUpperCase() + ' ROW';
 btnShowStep.dataset.step = step;
 } else {
 btnShowStep.style.display = 'none';
 }
}

function onShowStep() {
 const p = getCurrent();
 const ps = getCurrentPS();
 const step = $('#btnShowStep').dataset.step;
 if (!step || (step !== 'initial' && step !== 'change' && step !== 'eq')) return;
 p.species.forEach(s => {
 let val = '';
 if (step === 'initial') val = formatNum(s.initial);
 else if (step === 'change') {
 const sign = s.kind === 'reactant' ? '-' : '+';
 const c = s.coef === 1 ? '' : s.coef;
 val = sign + c + 'x';
 } else if (step === 'eq') {
 const ch = expectedChange(s);
 if (s.initial === 0) val = (ch < 0 ? '-' : '') + (s.coef === 1 ? 'x' : s.coef + 'x');
 else val = formatNum(s.initial) + (ch < 0 ? ' - ' : ' + ') + (s.coef === 1 ? 'x' : s.coef + 'x');
 }
 ps.rows[step][s.key] = { value: val, correct: true };
 });
 ps.rowStatus[step] = 'done';
 if (step === 'initial') ps.rowStatus.change = 'active';
 if (step === 'change') ps.rowStatus.eq = 'active';
 if (step === 'eq') ps.kExprLocked = false;
 ps.hintsTotal += 1;
 setFeedback(`Step revealed. Move on.`, 'hint');
 renderICETable();
 attachIceEvents();
 if (!ps.kExprLocked) renderKExprStep();
 renderStepsProgress();
 updateButtonStates();
}

function onShowSolution() {
 const p = getCurrent();
 const ps = getCurrentPS();
 if (ps.completed) return;
 if (!confirm('Show full solution? This will limit you to 1 star and break your streak.')) return;
 ps.solutionShown = true;
 const x = trueX(p);
 p.species.forEach(s => {
 ps.rows.initial[s.key] = { value: formatNum(s.initial), correct: true };
 const sign = s.kind === 'reactant' ? '-' : '+';
 const c = s.coef === 1 ? '' : s.coef;
 ps.rows.change[s.key] = { value: sign + c + 'x', correct: true };
 if (s.initial === 0) {
 ps.rows.eq[s.key] = { value: (sign === '-' ? '-' : '') + (s.coef === 1 ? 'x' : s.coef + 'x'), correct: true };
 } else {
 ps.rows.eq[s.key] = { value: formatNum(s.initial) + (sign === '-' ? ' - ' : ' + ') + (s.coef === 1 ? 'x' : s.coef + 'x'), correct: true };
 }
 });
 ps.rowStatus = { initial: 'done', change: 'done', eq: 'done' };
 if (ps.qShift) {
 ps.qShift.done = true;
 ps.qShift.valueAttempt = '0';
 ps.qShift.directionAttempt = 'forward';
 }
 const exp = expectedKExpression(p);
 ps.kExpr.num = exp.num.map(it => ({ ...it }));
 ps.kExpr.den = exp.den.map(it => ({ ...it }));
 ps.kExprDone = true;
 ps.kExprLocked = false;
 ps.solveLocked = false;
 ps.solveDone = true;
 ps.solveValue = formatNum(x);
 ps.approxShown = true;
 renderWorkspace();
 setTimeout(() => completeProblem(), 200);
}

function onReset() {
 if (!confirm('Reset this problem? Current progress will be cleared (does not affect stats).')) return;
 const id = state.currentProblem.id;
 state.problems[id] = newProblemState();
 renderWorkspace();
}

/* =====================================================
 INIT / WIRING
 ===================================================== */
$('#btnSidebar').addEventListener('click', toggleSidebar);
$('#brandHome').addEventListener('click', () => renderHome());
$('#sideChangeMode').addEventListener('click', () => renderHome());
$('#sideNewProblem').addEventListener('click', () => startNewProblem());

document.addEventListener('keydown', (e) => {
 // Don't intercept while typing in inputs
 const tag = (e.target && e.target.tagName) || '';
 const typing = tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable);
 if (typing) return;
 if (e.key === 's' || e.key === 'S') { toggleSidebar(); }
 else if (e.key === 'n' || e.key === 'N') { startNewProblem(); }
 else if (e.key === 'h' || e.key === 'H') { renderHome(); }
});

function init() {
 if (!window.katex) {
 setTimeout(init, 100);
 return;
 }
 loadState();
 applySidebar();
 renderHUD();
 renderSidebar();
 renderHome();
}
init();
</script>
</body>
</html>
