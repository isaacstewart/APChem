<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Roster Grouper</title>
    <style>
        /* Base Styling & Light Mode Variables */
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --text-sub: #64748b;
            --border-color: #cbd5e1;
            --border-card: #e2e8f0;
            --btn-opt-bg: #f1f5f9;
            --input-bg: #ffffff;
            --group-border: #1e293b;
            --student-text: #334155;
        }

        /* Dark Mode Overrides */
        body.dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --text-sub: #94a3b8;
            --border-color: #475569;
            --border-card: #334155;
            --btn-opt-bg: #334155;
            --input-bg: #1e293b;
            --group-border: #f8fafc;
            --student-text: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; min-height: 100vh; transition: background-color 0.2s, color 0.2s; }
        
        .container { max-width: 1400px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Global Theme Toggle Button Positioned Top Right */
        .theme-toggle-container { position: absolute; top: 0; right: 0; z-index: 10; }
        .btn-theme { background: var(--btn-opt-bg); border: 2px solid var(--border-color); color: var(--text-main); padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        
        .screen { display: none; width: 100%; flex: 1; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* Setup Screen Controls */
        .setup-card { background: var(--bg-card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 650px; margin: 20px auto; width: 100%; border: 1px solid var(--border-card); }
        h1 { margin-bottom: 20px; font-size: 1.8rem; color: var(--text-main); text-align: center; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.95rem; }
        
        /* Class Selector Tabs */
        .class-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .tab-btn { background: var(--btn-opt-bg); border: 2px solid var(--border-card); padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all 0.2s; text-align: center; font-size: 0.9rem; }
        .tab-btn.active { background: #2563eb; color: white; border-color: #1d4ed8; }
        
        .class-name-input { width: 100%; padding: 10px; border: 2px solid var(--border-color); background-color: var(--input-bg); color: var(--text-main); border-radius: 8px; font-size: 1rem; margin-bottom: 15px; font-weight: 600; }
        .class-name-input:focus { outline: none; border-color: #3b82f6; }

        textarea { width: 100%; height: 160px; padding: 12px; border: 2px solid var(--border-color); background-color: var(--input-bg); color: var(--text-main); border-radius: 8px; font-size: 1rem; resize: none; margin-bottom: 15px; }
        textarea:focus { outline: none; border-color: #3b82f6; }
        
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .btn-opt { background: var(--btn-opt-bg); border: 2px solid var(--border-color); color: var(--text-main); padding: 14px 8px; border-radius: 8px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.2s; font-size: 0.95rem; }
        .btn-opt small { display: block; font-weight: 400; color: var(--text-sub); margin-top: 4px; }
        .btn-opt.selected { background: #2563eb; color: white; border-color: #1d4ed8; }
        .btn-opt.selected small { color: #bfdbfe; }
        
        .btn-main { background: #10b981; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn-main:hover { background: #059669; }
        .btn-demo { background: transparent; color: #3b82f6; border: 1px dashed #3b82f6; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; float: right; margin-bottom: 5px; }
        
        /* Projector View Screen */
        .proj-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 4px solid var(--border-color); padding-bottom: 10px; margin-right: 140px; } /* Margin preserves layout space for toggle button */
        .proj-title { font-size: 2.6rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.02em; }
        .proj-subtitle { font-size: 1.5rem; color: var(--text-sub); font-weight: 600; margin-left: 15px; }
        .btn-back { background: #64748b; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: 600; }
        .btn-back:hover { background: #475569; }
        
        /* Smart Auto-Fitting Grid to Prevent Scrolling */
        .groups-grid { display: grid; gap: 16px; align-content: center; flex: 1; width: 100%; margin: auto 0; }
        
        /* Grid Layout States based on group count */
        .grid-layout-wide { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
        .grid-layout-dense { grid-template-columns: repeat(3, 1fr); }
        .grid-layout-2col { grid-template-columns: repeat(2, 1fr); }
        
        /* Group Display Cards */
        .group-card { background: var(--bg-card); border: 4px solid var(--group-border); border-radius: 12px; padding: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: flex; flex-direction: column; justify-content: flex-start; }
        .group-name { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin-bottom: 12px; border-bottom: 2px solid var(--border-card); padding-bottom: 6px; }
        .student-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .student-item { font-size: 1.45rem; font-weight: 600; color: var(--student-text); display: flex; flex-direction: column; justify-content: center; padding: 4px 0; }
        
        /* High-Contrast POGIL Badges */
        .role-badge { font-size: 0.85rem; font-weight: 800; color: #ffffff; background: #475569; padding: 3px 8px; border-radius: 4px; display: inline-block; width: max-content; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
        body.dark-mode .role-badge { background: #f1f5f9; color: #0f172a; }
        .role-combined { background: #b45309; color: #ffffff !important; } /* Distinct amber color for combined roles remains consistent */
    </style>
</head>
<body>

    <div class="container">
        <div class="theme-toggle-container">
            <button class="btn-theme" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
            </button>
        </div>

        <div id="setup-screen" class="screen active">
            <div class="setup-card">
                <h1>Class Roster Grouper</h1>
                
                <label>Select & Manage Class:</label>
                <div class="class-tabs">
                    <button id="tab-class1" class="tab-btn active" onclick="switchClass('class1')">Class 1</button>
                    <button id="tab-class2" class="tab-btn" onclick="switchClass('class2')">Class 2</button>
                    <button id="tab-class3" class="tab-btn" onclick="switchClass('class3')">Class 3</button>
                </div>

                <label for="class-name">Class Display Label:</label>
                <input type="text" id="class-name" class="class-name-input" oninput="saveCurrentClassData()" placeholder="e.g., AP Chem Period 1">
                
                <button class="btn-demo" onclick="loadDemoRoster()">Load Demo Roster (17 Students)</button>
                <label for="roster-input">Class Roster (One name per line):</label>
                <textarea id="roster-input" oninput="saveCurrentClassData()" placeholder="Enter student names here..."></textarea>
                
                <label>Select Activity Configuration:</label>
                <div class="options-grid">
                    <button class="btn-opt selected" onclick="selectActivity(3, 'Board Work', this)">
                        Board Work <small>Groups of 3</small>
                    </button>
                    <button class="btn-opt" onclick="selectActivity(4, 'POGILs', this)">
                        POGILs <small>Groups of 4</small>
                    </button>
                </div>
                
                <button class="btn-main" onclick="generateGroups()">Generate & Project Groups</button>
            </div>
        </div>

        <div id="projector-screen" class="screen">
            <div class="proj-header">
                <div>
                    <span id="proj-title" class="proj-title">Activity Groups</span>
                    <span id="proj-class-label" class="proj-subtitle"></span>
                </div>
                <button class="btn-back" onclick="showSetup()">← Back / Edit</button>
            </div>
            <div id="groups-container" class="groups-grid">
                </div>
        </div>
    </div>

    <script>
        // State management
        let targetSize = 3;
        let activityName = 'Board Work';
        let currentSlot = 'class1';
        
        let store = {
            class1: { name: 'Class 1', roster: '' },
            class2: { name: 'Class 2', roster: '' },
            class3: { name: 'Class 3', roster: '' }
        };

        const boardLabels = ["Back Left", "Back Right", "Front Left", "Front Right", "Side", "Front Center"];
        const chemLawLabels = ["Hess's Law", "Avogadro's Law", "Beer's Law", "Coulomb's Law", "Boyle's Law", "Charles's Law", "Dalton's Law"];

        // Initialize App & Load Cache
        window.onload = function() {
            // Load custom classes
            const savedStore = localStorage.getItem('multiClassRosterStore');
            if (savedStore) {
                store = JSON.parse(savedStore);
            }
            updateUIForSlot();

            // Load theme preference
            const savedTheme = localStorage.getItem('themePreference');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').innerText = '☀️';
                document.getElementById('theme-text').innerText = 'Light Mode';
            }
        };

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('themePreference', isDark ? 'dark' : 'light');
            
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
            document.getElementById('theme-text').innerText = isDark ? 'Light Mode' : 'Dark Mode';
        }

        function switchClass(slotId) {
            saveCurrentClassData(); 
            currentSlot = slotId;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${slotId}`).classList.add('active');
            
            updateUIForSlot();
        }

        function updateUIForSlot() {
            document.getElementById('class-name').value = store[currentSlot].name;
            document.getElementById('roster-input').value = store[currentSlot].roster;
            updateTabLabels();
        }

        function saveCurrentClassData() {
            store[currentSlot].name = document.getElementById('class-name').value || `Class ${currentSlot.replace('class', '')}`;
            store[currentSlot].roster = document.getElementById('roster-input').value;
            
            localStorage.setItem('multiClassRosterStore', JSON.stringify(store));
            updateTabLabels();
        }

        function updateTabLabels() {
            document.getElementById('tab-class1').innerText = store.class1.name || 'Class 1';
            document.getElementById('tab-class2').innerText = store.class2.name || 'Class 2';
            document.getElementById('tab-class3').innerText = store.class3.name || 'Class 3';
        }

        function loadDemoRoster() {
            const demo = ["Alex M.", "Jordan B.", "Taylor K.", "Morgan S.", "Drew P.", "Casey J.", "Jamie R.", "Riley T.", "Skyler W.", "Cameron D.", "Reese L.", "Logan V.", "Peyton C.", "Quinn E.", "Hayden F.", "Robin G.", "Avery H."];
            document.getElementById('roster-input').value = demo.join('\n');
            saveCurrentClassData();
        }

        function selectActivity(size, name, element) {
            targetSize = size;
            activityName = name;
            document.querySelectorAll('.btn-opt').forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
        }

        function showSetup() {
            document.getElementById('projector-screen').classList.remove('active');
            document.getElementById('setup-screen').classList.add('active');
        }

        function generateGroups() {
            saveCurrentClassData(); 
            const rawInput = store[currentSlot].roster;

            const students = rawInput.split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);

            if (students.length === 0) {
                alert("Please add at least one student to the roster.");
                return;
            }

            for (let i = students.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [students[i], students[j]] = [students[j], students[i]];
            }

            const groupSizes = calculateBalancedSizes(students.length, targetSize);
            
            const groups = [];
            let currentPointer = 0;
            groupSizes.forEach(size => {
                groups.push(students.slice(currentPointer, currentPointer + size));
                currentPointer += size;
            });

            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('projector-screen').classList.add('active');
            
            document.getElementById('proj-title').innerText = `${activityName}`;
            document.getElementById('proj-class-label').innerText = `|  ${store[currentSlot].name}`;

            renderProjectorView(groups);
        }

        function calculateBalancedSizes(numStudents, target) {
            if (numStudents <= target) return [numStudents];
            let numGroups = Math.floor(numStudents / target);
            let remainder = numStudents % target;
            if (remainder === 0) return Array(numGroups).fill(target);
            
            if (target === 3) {
                if (remainder === 1) {
                    let sizes = Array(numGroups).fill(3);
                    sizes[0] = 4;
                    return sizes;
                } else if (remainder === 2) {
                    let sizes = Array(numGroups).fill(3);
                    sizes.push(2);
                    return sizes;
                }
            }
            if (target === 4) {
                if (remainder === 1) {
                    let sizes = Array(numGroups).fill(4);
                    sizes[0] = 5;
                    return sizes;
                } else if (remainder === 2) {
                    let sizes = Array(numGroups - 1).fill(4);
                    sizes.push(3, 3);
                    return sizes;
                } else if (remainder === 3) {
                    let sizes = Array(numGroups).fill(4);
                    sizes.push(3);
                    return sizes;
                }
            }
            let sizes = Array(numGroups).fill(target);
            for (let i = 0; i < remainder; i++) {
                sizes[i % sizes.length]++;
            }
            return sizes;
        }

        function renderProjectorView(groups) {
            const container = document.getElementById('groups-container');
            container.innerHTML = '';
            
            container.className = 'groups-grid';
            if (groups.length <= 3) {
                container.classList.add('grid-layout-wide');
            } else if (groups.length <= 6) {
                container.classList.add('grid-layout-2col');
            } else {
                container.classList.add('grid-layout-dense');
            }

            const isPogil = (activityName === 'POGILs');

            groups.forEach((group, gIdx) => {
                const card = document.createElement('div');
                card.className = 'group-card';
                
                let cardHeading = `Group ${gIdx + 1}`;
                if (isPogil) {
                    cardHeading = chemLawLabels[gIdx] || `Law Assignment ${gIdx + 1}`;
                } else if (activityName === 'Board Work') {
                    cardHeading = boardLabels[gIdx] || `Extra Board ${gIdx + 1}`;
                }

                let html = `<div class="group-name">${cardHeading}</div>`;
                html += `<ul class="student-list">`;
                
                group.forEach((student, sIdx) => {
                    html += `<li class="student-item">`;
                    html += `<span>${student}</span>`;
                    
                    if (isPogil) {
                        let role = '';
                        let isCombined = false;
                        
                        if (group.length === 4) {
                            const standardRoles = ["Manager", "Recorder", "Spokesperson", "Process Analyst"];
                            role = standardRoles[sIdx];
                        } else if (group.length === 3) {
                            if (sIdx === 0) role = "Manager";
                            if (sIdx === 1) role = "Spokesperson";
                            if (sIdx === 2) { role = "Recorder & Process Analyst"; isCombined = true; }
                        } else if (group.length === 2) {
                            if (sIdx === 0) { role = "Manager & Spokesperson"; isCombined = true; }
                            if (sIdx === 1) { role = "Recorder & Process Analyst"; isCombined = true; }
                        } else if (group.length >= 5) {
                            const extraRoles = ["Manager", "Recorder", "Spokesperson", "Process Analyst", "Reflector"];
                            role = extraRoles[sIdx] || "Member";
                        }
                        
                        const badgeClass = isCombined ? "role-badge role-combined" : "role-badge";
                        html += `<span class="${badgeClass}">${role}</span>`;
                    }
                    
                    html += `</li>`;
                });
                
                html += `</ul>`;
                card.innerHTML = html;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
